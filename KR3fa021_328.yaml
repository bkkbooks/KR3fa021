body:
  text: 氣線及時刻纖毫不爽也若盂內無水則表影與本節氣線不對而大謬矣其照界節氣線日略依常法空明氣中製之則表端與本節氣線難免有過不及之差今依氣水差表製之豈有表影與其所測之高度不相合者哉
