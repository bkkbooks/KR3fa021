body:
  text: 新儀輕重比例之法夫儀之重輕與其大小必有一定之比例因其輕重可推而知其大小又因其大小可推而知其輕重凡為輕重者必以其體形相等為主兩物體形相等者彼此有輕重多寡之比不想等者其輕重無相比之定理如有銅球於此其徑一尺不可以為一定之輕重若相等形之他球如同徑之鐵球木球斯可以比之而定其輕重蓋鐵球比銅球為輕比木球為重也輕重學有云凡銅色之球如皆為銅或鐵等其輕重之比例為其全徑三加之比例如有兩銅球甲與乙見二十三圖甲之徑為二尺乙之徑為一尺若甲球重三千零四十斤則乙球之重必三百八十斤因此比例法從輕推重從小推大又從同色之類推大小之同類譬如將黃蠟作球從此蠟圈蠟球之輕重可推金銀銅等項之同徑球之輕重凡鑄剝儀先用蠟作各儀之式樣其法曰造諸色同徑之體如球
  hash: sha256:929e57c91cc86420e7cd4b2d8d7a56fcc7fa61eaead02195807d180f1ab6364c
