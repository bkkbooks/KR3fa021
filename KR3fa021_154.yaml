body:
  text: 新儀之適於用儀之式有二一日內式一日外式內式為儀之模而以肖乎本象者也在天有赤道儀之象因定本儀為赤道之儀而用之則必與在天之赤道經緯圈相似所謂內式也若夫外式則取乎綴飾以美觀且兼於適用令彼此不相滯礙乃為得耳然從來創儀者多用心於綴飾而罕加意於適用儀之所以弊也仁之創制夫儀也惟務密合乎天行密合乎本曆之法為第一儀而便用次之綴籂又次之元與明世之義不適於用之處有三其一則不明透如簡儀渾儀諸圈內多有交梁窺表稠密其規面側面皆粗厚其座架左右上下俱有銅柱縱橫相交以故東西南北多許之星窺表不能對照焉若天頂立運圈則隱於簡之下一切在南之星難以窺之若渾儀半隱於四面鋼箱之內縱有星相其在地平下時一切不見今六儀之為制也上下左右極
  hash: sha256:f942f778edd39c0606e13c609d99712af84c98a06b42f748422a9e26144030d2
