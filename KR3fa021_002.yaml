body:
  text: 夫古帝王憲天出治未有石以欽若敬授為兢兢也皇古以前可不論巳若夫堯典置閏餘而定四時紀七政而明天度必在璿璣玉衡以齊之者誠以厯必有理與象與數而儀器即所在首重也夫儀也者厯之理由此得精焉厯之法由此得密焉度數之學實範園於此而莫可外焉矣聞之古人每遇交食分至及五緯凌犯諸變異乃始靜悟於心繼必詳録於策而猶恐
  hash: sha256:e14771283a9870365ec605c4582728819cb7d2f75d3cf0c1306678ece46faa23
