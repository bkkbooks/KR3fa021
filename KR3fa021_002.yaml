body:
  text: 夫古帝王憲天出治未有石以欽若敬授爲兢兢也皇古以前可不論巳若夫堯典置閏餘而定四時紀七政而明天度必在璿璣玉衡以齊之者誠以厯必有理與象與數而儀器卽所在首重也夫儀也者厯之理由此得精焉厯之法由此得宻焉度數之學實範園於此而莫可外焉矣聞之古人每遇交食分至及五緯凌犯諸變異乃始靜悟於心繼必詳錄於策而猶恐
  hash: sha256:8ae22d973e81be0635655ce5fe715be24eb1a8c68c5327563ba5d5770c733c3b
