body:
  text: 赤道經緯全儀赤道儀之有三圈外大圈者天元子午圈也其經線其四靣寬厚其分劃度分之法並堅固其下周之小半而夾入於雲座半圈之內皆輿黃道儀之外圈同又從圈之側靣南北極定度起算各去九十度定為赤道經圈見第二圈輿子午圈相交之處兩處各以十字直角相交其圈之內靣輿外靣各陷其中以相人令從橫于兩內規靣皆平靣則兩圈皆為一體而恆定不移也次兩圈內之赤道緯圈管于赤道兩極而東西遊轉橫相切于赤道之經圈也經緯兩圈之規靣其寬各二寸五分側靣厚一寸三分而南北兩極安定緯圈其內處之規靣上下安以鋼軸鋼樞諸項皆輿黃道同法焉又南北兩極各有獸靣安定于緯圈內規靣之中而獸吻其圓軸以代赤道經表軸之中心立有圓柱以代緯表又軸及柱之經各一寸一分若欲以兩極之經線而
  hash: sha256:bcc1ca3d9bf9f9d8a8101b602775586a0be110b7888dbfd24213c1c515f75c3d
