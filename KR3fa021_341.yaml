body:
  text: 測空際異色并虹霓珥量諸象格物家論色之異有二一真實一幻妄何謂真實蓋從寒熱燥濕四元行之情相交而生然必雜體可見而純體不可見也何謂幻妄蓋從光照物體退返之勢而生雖易顯著亦易涣散夫二者亦各分五等正相反者有二純白純黑是也又中等者有三黃紅青是也由是五等彼此相交相變而各色生矣見一百十一圖姑以各色玻璃相交映之勢言之于一密室中戶牗皆閉務令幽暗或戶或牗微開一隙其大小輿玻璃相稱而以通日光隙內置各色玻璃用潔白紙對之其日光透射玻璃玻璃所映之色必映于紙上如隙內並置玻璃兩片一黃色一紅色者則紙上必現黃金之色矣如並置兩片一黃一青者則紙上必現緑色矣如並置兩片一紅一青者則紙上必現紫色矣餘倣此若以銅圓柱鏡對于通日光之隙則周圍返照之光而五彩虹霓之象
