body:
  text: 地平經緯儀並天體儀安定之法怒家欲精測天象之地坪經緯度則必分地平之經緯與緯度而兩測之如使竝測于一儀恐未可以爲凖也今先論夫安經儀之法其要端有二其一地平圈必務合于天元地平線而從本圈之中心所離之直線必須合于天元頂線故儀之頂線置窺筒內筒之外有垂線見九十五圖次四靣之螺旋轉柱上下進退使垂線不倚窺筒而四靣正合筒底所刻爲凖之記其一地平圈上南北之線必須合于天元地平上南北之線其法與向所論真正南北向之線諸法無異又可用赤道之儀以考測其差與否葢冬夏二至相近日太陽在巳位時測其離正午徃東若干或度數分或刻數分而于其時又以地平圈表對之並本圈上與其所對之度分記讖之又太陽在未位時測其離正午徃西與其在午前相同之度数分或刻數分而彼時又卽以地平表對
