body:
  text: 新儀安置之法並摘羅經之誤凡測天之儀蓋本乎厯象自然之法而造為微之器者也故儀與天合象直規使安之而失其正則儀必不合乎天矣不知者歸咎于厯法之不合天或以為儀之不合于法又因不知其舛錯之處而究其本源旺意修攺反以良法為弊法目之此厯法之亂所由始也夫安儀之法一以四方向一以北極高度此為兩大端苟有纖毫之差則儀不合于天矣測定本極之高度詳載日躔厯指二卷諸法中若定安儀之方向斷乎不可以羅經為主蓋羅經或偏東或偏西天下各省多寡不同向正南正北者絶少京師偏東四度有餘故京師內外凡房舍填地山向俱依羅經所定者率多有偏未有一向正南者仁數載京凡所閲歷安定日晷諸儀多所測試每有南北之墻四五丈內偏三尺餘者夫觀象臺原屬安諸儀以測天定諸
