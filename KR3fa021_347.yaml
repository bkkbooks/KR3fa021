body:
  text: 之彩色其理故無異矣又虹霓本然之秒及其所以然之奇為衆象首原夫虹霓乃潤雲被日對照而成多色之弧也蓋雲者虹之質而雲之潤乃所以必成其虹質之勢也一被日對照而虹乃由之以成矣夫雲非當其化雨則不能生虹而雲非承日光則虹無由而成又日光非正對則虹又無由而成故虹之見也必朝西而暮東亦或東北也日弧者虹形之曲也日多色者別虹于諸色他弧他象也次日同時多虹可成假如日當于午東西方各有雲氣日光照之遂成虹矣但因人目限于一方止見其一而不能并見其他耳假使一方而有二雲日光照之其一正對者變虹矣而其回光照及相近之雲又二變而為虹矣又由此雲所照之日光退傅至于他雲又三變而為虹矣若論其色之奇三變不如其二變二變不如其初變蓋初所變之虹則受日光之正照而二變與三所變之虹不過
