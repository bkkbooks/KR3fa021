body:
  text: 北兩軸相向左右上下纎毫不謬子午圈內次有過極至圈南北赤道兩極各以鋼軸相貫之兩極在規靣之中心而中心內外有鋼孔鋼軸入鋼樞免致鋼樞磨寬其北鋼樞則安于內規靣用小鐵條以貫之而過極圈不致垂下而失圓形矣其南鋼樞則安于外靣不令鋼靣轉磨而離於儀之中心焉又從南北赤極起算各去二十三度三十一分零三十秒定黃道極去極九十度橫置次三圈名黃道圈與過極圈相交過極圈亦名帶黃道圈兩交處各陷其中以相入令兩圈為一體旋轉想從黃道交一在冬至一在夏至黃道圈內安次四圈名黃道緯圈結于黃道南北之兩極其鋼軸鋼樞之安法皆與帶黃道圈無異夫子千圈內共三圈各規靣之寬曰二寸五分便于刻度分秒其厚約一寸三分緯圈南北兩極各有獸靣以圓軸其圓徑約一寸以為徑表軸之兩端有螺柱定之若宇不用圓軸
