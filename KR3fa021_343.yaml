body:
  text: 俱顯矣至于各色明麗深淺濃淡之加减則隨其圓柱鏡之光有斜正返照之勢而生焉蓋圓柱鏡返照之日光愈斜則其所映之光愈昏而其色之變異遂去日之原光愈遠矣若夫真實之色别有闡發今止就幻妄之色而論之大凡有形象者皆由質模作為四者而成諸異色也其質者即空際之氣也氣必稍厚而密方可成色其模者即光也光道愈密則各色必愈明麗矣其作者即太陽與射光之星月也其為者即六合品彚之全而萬有之美也其色之異者或由夫氣質之厚薄或由夫光輝之進退或由夫空際之異勢蓋凡光照空際之體厚則其所生之色必深而黑若體稍薄而濕則其色必青若又稍薄則其色必紅若體薄甚則其色青緑若體精而稍厚色則為黃矣即日月星辰之異色多為空際之所映射而致正如火焰之異色由烟氣熏灼而成耳
