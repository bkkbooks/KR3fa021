body:
  text: 新儀體巨極分秒之明晰凡儀之大小式無一定必以無過不及之差者為凖則焉何也儀大則分劃詳悉而分秒畢清儀小則分劃簡略而度分踈漏夫毫厘之差謬以千里創儀用以測天是鳥容草率而為之然定儀之大小以徑線為凖前代諸儀徑線極大不踰五尺二寸新儀之徑即小皆六尺有餘大則一丈二尺抑思從來厯家創制儀器務為廣大者無非欲每度寬濶其地得以細劃分秒而巳然卒未有得法而曲盡其善者也蓋儀器之貴乎大非為其形體之巨有足觀也亦在乎每度加廣使分秒有餘地之可容耳今新儀則每度加廣纎悉畢具是何也新儀另用負圈表因可以得負圈角故有餘地可容而分劃得全也在舊儀止容其半巳耳然則新儀之小者全徑六尺即可當一丈二尺見十三圖甲乙象限儀其全徑甲乙丁一丈二尺若用其全徑甲乙丁以為負
  hash: sha256:a94d3557d208f81664e54316306a87657418266379f9bd6f6988e3f7e3a5cc6e
