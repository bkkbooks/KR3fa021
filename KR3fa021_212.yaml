body:
  text: 應豎立而用上下對面線之比例見四十一圖下而之上定內外邊界線與上下之界線正對然後照前法畵內外邊之界線次本圈又豎立而用細齒之銅鋸照內外之界線鋸解其粗模見四十二圖又次用粗細各銼以銼圈之內外邊爲平圓至內外界線而止次本圈又橫置與地面相平而用極細之銼四面平磋之令上下各相對之面平合于內細微之線又次以細微之徑線爲凖則從兩相對處緊合之令其相交于圈之中心見四十三圖四面皆凖合於此則本圈各兩相對弧可代測天之表而可凖對于分秒之細微至天體之球則必錠之而後得圓其錠之之汯與他圈同見四十四圖諸圈類此皆須于上下橫豎反復而經百手則其工之大端得矣乃于其四面上依法劃圈線度數分秒然後諸圈榫對令其中心相合歸于一點卽天體之中心而上下左右各分秒摠歸于全儀之一心見四十五圖務令各
  hash: sha256:b68374099b57541f8e48901fb35fa66779df33b17ca1e26764f6cdbfc0e73d69
