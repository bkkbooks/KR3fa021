body:
  text: 凝固如本球甲一觸外來之冷氣則內所含之氣必收斂左管之水欲實其虛故不得不强之而上升矣總之天下之物皆貫通聠屬必相濟而後能相保此空虛之所以必欲其實也今甲丁之氣既被外冷而收斂則原占之所較前必小假如前占甲丁之所而自收斂之後不過甲巳耳設丁丙水不上以至巳則巳丁之管盡無氣而空矣然物性既不容空則丁丙之水勢不得不强升以補之假使塞管之口而不使通外氣則甲丁內氣為外冷所逼勢必收斂凝固雖甲丁之器為銅鐵所成必自破裂而收外氣以補盈其空關矣又自外來之氣甚熱而內氣必欲舒放無隙可出則甲丁既無所容亦必自破裂而奮出矣測氣燥濕之分夫燥氣之性於凡物之所入即收斂而固結之濕氣之性反是欲察天氣燥濕之變而萬物
  hash: sha256:c4c74f192f9386a1d976a835184e7891a2a75325c0beaf5f8fa0ba11bdd90b5b
