body:
  text: 推其理也其餘四金之體皆為雜體則離純土之性更遠矣所謂純土者即四元行之一行並無他行以雜之也夫地上之淺土雜土為日月諸星所照臨以為五穀百果草木萬彚化育之功純土則在地之至深如山之中央如石鐵等礦是也審此則鐵及吸鐵石并純土同類而其氣皆為向南北兩極之氣自具各能轉動本體之兩極而正對夫天上南北之兩極此皆本乎地之脉絡者然也夫地之兩極原自正對夫天上南北之兩極猶之草木之脉絡皆自達其氣而上生焉蓋天下萬物之體莫不有其本性則未有不順本性之行以全乎其為本體者也又當考天下萬國堪與諸書圖五大洲凡名山大川皆互相綿亘至幾千萬里之遙自南而北逶迤繍錯其列于地者顯而可見也其內之脉絡蟬聊索貫即何殊乎人身之脉絡骨節縱橫通貫而成其為全體也哉
