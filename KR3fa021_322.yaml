body:
  text: 有厚薄之分厚薄有加减則其所通光之差亦因之而有加减又凡其所差以天頂線為主其頂線則立於光所初人之地夫日月諸星之光若從易通光之體而難入通光之體則其所透之光必向頂線而凝聚矣若從難通光之體而入易通光之體則其所透之光必離頂線而漁散矣見一百十三圖假如丙丁為水盈之盤於其底而置一錢而錢所升之象與太陽之升光同一理也其象交水盤之邊而初入孔明之氣若立頂線如壬丙巳則明見其象不依直線而射於乙必更離於壬丙巳頂線而偏射於辛因從難透之水體入易透之氣體故也又試觀空明之地如辛有光而以頂線壬丙巳從本盤之底巳至立水面丙立有直表而辛光之一道照至於丙點其光道與表影不依直線而射戊地必依曲線向壬丙巳頂線而偏於甲因從易透空明之氣體入難透之水體故也其測法用兩象限儀
