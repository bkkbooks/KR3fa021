body:
  text: 黃赤二儀互相推測度分表黃赤二儀互相推測度分者何以黃道儀測各星之經緯度立爲表而推各星之赤道經緯度以赤道儀測各星之經緯度立爲表而推各星之黃道經緯度也其表有二一以赤道經度爲主一以緯度爲主縱橫兩行所列者黃道經緯度也中兩行相遇之方內赤道相應經緯之度也其赤道經度皆從春分起算若黃赤兩儀所測之度分或過與不及則用中比例法以推定之其查表法與查他表無異
