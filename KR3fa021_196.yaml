body:
  text: 新儀之重心向地之中心凡有重體之論必以其重心爲主所謂重心者卽重物內之一點而其上下左右兩重彼此相等也如二十六圖甲乙體內丙點是也但每重體獨有一重心儀器則有本形之中心亦有本體之重心凡儀器中心必當天之中卽地之中心也葢凡推筭日月五星二十八宿等在天所行之度分必以天之中心爲主從天之中心出線至天上各星則定某星在本天大圈之某度分乃從儀之小圈以測驗之而凖其度分必儀之小圈之度分與在天大圈之度分相應相合然在天之大圈與儀之小圈之度分上下旣一一相應相合則在天之大圈與儀之小圈所向之中心必爲一無二矣今人用儀之時雖在於地面之上而離地之中心卽天之中心約一萬五千里其從地面所測天上之度分卽如從地中心測驗之無而葢地平徑之差與天之最高最遠無比
  hash: sha256:a1f7c0388e3a6f8110abd52ce8ef3f165ecec150c73f7f35f5796a5c0a700672
