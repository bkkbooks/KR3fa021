body:
  text: 論飛葭之無合於厯如前驗氣之法其微妙如此且不可以測天上之節氣分也况葭管飛厭其術莫驗又安所用之哉故凡引鐘律以為驗節氣法者不過欲附會欺世擾紊厯法耳天其可欺也哉今約舉四端以辨之一春分之日太陽正交赤道之日也萬國同是此日故萬國同日皆可以測驗飛厭候氣全係地氣地氣有冷熱乾濕之不同萬國有不同之地氣無不一之春分也二每年太陽一交赤道便為春分則春分萬年如一永不改變若地氣至春分時各國每年攺變不同設欲以地氣測春分則春分年年不同矣三春分只有一日春分前後幾日地氣乾濕冷熱大概相同難以分別况春分等節氣只在本日一刻之間本日自朝至幕地氣亦大概如一又難以分別何可就地氣以測定春
