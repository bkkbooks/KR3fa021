body:
  text: 之比例則太陽天周圍之里數包地周圍之里數一千一百四十二倍也若照前所擬銃彈行空三日而不斷則必須四于二百三十三日即十一年零一百一十八日始行盡于太陽天一日內所行一周之里數矣又恆星天全徑與太陽天全徑如十二與一則恆星天一周包日天一周十二倍也故夫銃彈以行盡太陽天之數推之則必須一百三十九年零八十四日始行盡于恆星一日所行之里數矣然凡此天行之疾則又有何所比擬哉作法假如六十四圖庚辛為銅橫條釘穩于橫木梁上令毫不動搖壬丁戊巳為粗銅耳中安銅軸而軸長徑線丁戊須與地平線平行軸中繫垂線球其球隨本橫軸轉動恆當甲丙過天項一圈線之中往來而不離於左右其軸之長徑線埀東之徑們等以便自此軸中心至球之中心北測而定埀線長短之尺寸分
