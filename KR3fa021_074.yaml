body:
  text: 代為經表用之亦無不可者緯表從橫有兩經線其從徑輿赤道圈之中線正對其橫徑輿緯圈之側靣恆平行又赤道內之規靣并上側靣刻有二十四小時以初正兩字别之每小時均分四刻二十四小時共九十六刻規靣每一刻平分三長方形每一方平分五分一刻共十五分每一分以對角線之比例又分十二細分則一刻共一百八十細分每一分則當五秒今游表之指線亦平分而每分輿對角線之十二分各有相當之比例又各細分五秒則一刻每分六十秒十五分共九百秒矣如此而分之法可不謂微矣乎又子午圈向東之正靣為子午線所從起而南輿北兩軸之中心正輿此靣相對以為分界至若軸樞之半在于此靣而半在于伏兔則兩合螺柱以定之而并如一體焉又赤道之上側靣于子午圈之正南交劃有午正初刻其內規靣劃有子正初刻而于正北交則側
