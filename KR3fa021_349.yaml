body:
  text: 受斜退之光巳耳虹色雖多約分爲三上如香圓色也中如青草色也下如红花色也然其所以不同之故由于雲之厚薄異勢故雲之上白而且薄接日之照則現黃色中之體厚則現綠色其下尤厚則現紅色矣至若雲之厚薄之異由于氣之勢異也氣之輕且薄者騰愈高接日光愈深其廻光愈弱所生之色愈輕淡矣氣之濁且厚者騰愈下日光愈淺其廻光愈強所生之色愈濃深矣至言二變之虹較之初變之虹色雖同而序相反上反爲紅中綠自若而下者反黃矣次日目月暈虹霓等象皆爲圓形其所一然者乃由日光斜透之勢耳凣現虹霓之時皆太陽所映彩色故碧落之雲無不變現但人目止見一圓弧之異色因其斜透圓弧之光道皆離太陽及離人目有一定之遠近故耳如鵓鴿之頸孔雀之向日空中雖發多色人目旁見之必有一定之近遠若或過或不及則異
