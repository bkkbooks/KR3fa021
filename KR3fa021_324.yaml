body:
  text: 一在水面上一正對於水面下見一百十圖而以水中表影所射之度數對比於水外日高之度數假如東西壬辛為半球空影其東西全徑於地平線平行其壬東辛西兩象限儀各平分九十度兩象限儀相對同穿於壬辛頂線軸上而任意左右轉移以對於太陽之高度次半球形用水盈之地平東西之線令齊而甲乙窺衡表對於太陽之高度則半徑辛乙表端之影水中所對射之度數為氣水高下差之度數矣若不用日光則目依窺衡表甲乙線水中所窺對之度數為氣水差之度數也今照比例法列為六等之表以明三等體所通光之差各體立氣水等差二表見於後篇今約舉數端以解之水差者光既從孔明之氣而入透於水則其水中所射之高度比在空明氣之高度所差若干度分也見一百四圖假如太陽空明處距天頂線八十度而其射光一道徑過半徑表端
