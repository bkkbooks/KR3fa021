body:
  text: 體或立方體權之得其輕重之差以為比例之根率如下表縱橫兩行列諸色之體名上邊之橫行從最重起至最輕止邊之縱行從最輕起至最重止縱橫兩行相遇之方位所得之數即兩同類異色之體輕重之比例也
