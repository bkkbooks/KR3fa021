body:
  text: 地平儀表地平儀表者以地平儀之某經緯度而推象時刻又以某時刻而推測太陽所離地平之某經緯度也夫測太陽所離地平經緯度總以極高度及赤道緯度為主故地平儀表天下各省不同因各省北極高卑度之不同故也其查表法以右直行之緯度與上列之刻數縱橫查之如數有多寡之不同則用中比例法而推定之內北極出地三十九度五十五分者二一為經度分為緯度分京師之高度也其餘各省本教歲經度靣緯度則見交分數
