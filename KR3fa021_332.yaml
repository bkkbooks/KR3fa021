body:
  text: 氣水等差表氣水差者卽光及物象從氣入水而斜透水內高度之差也所謂水氣差者卽光從水入氣而斜透則氣內高度之差也氣玻璃差及水玻璃差等俱倣此皆以光離天頂之遠近爲主假使太陽離天頂線四十度氣水差表內相對爲三十度其相差者乃十度也水氣差表內相對之度爲五十一度其差則十一度也氣玻璃差表內相對之度爲二十五度則所差爲十五度也其餘倣此
  hash: sha256:364926417ddf64f30b06502356e1fd0536c43a79250f3ac6204a1f39872e598a
