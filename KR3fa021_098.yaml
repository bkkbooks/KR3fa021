body:
  text: 天體儀諸儀之中其最像乎渾天而為用甚大者莫天體儀若也蓋天體儀乃渾天之全象而其為用則又諸儀之用之所統宗也然諸儀中最為難制者亦莫若天體儀為夫畢肖乎天形且便于用之為難也其難于畢肖天形者難以取圓故也其難便于用者難于周圍均輕而無偏垂故也其取圓則以子午圈或地乎圈為凖先應分子午圈劃為四象限見第六圈次定兩相對之界以為南北二極每一象限則分為九十度而兩極各為九十度之界子午靣則以兩靣度及宇彼此凖對每一度以對角線之比例而另以六十細分又每一分更細而四分之而每四分之一則當十五秒也則以游表識之焉又子午立圈以向東之規靣為正靣而儀之中心乃正對于斯其南北兩極各作圓半孔以受儀之半軸其他半以伏免圓半孔受之兩半圓相合以螺旋轉定
  hash: sha256:b4a8451ce4eddc9ec283c12fc7dd14e08aac327610e3c8ba37cb159c29ce5726
