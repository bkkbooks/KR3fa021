body:
  text: 天體儀諸儀之中其最像乎渾天而爲用甚大者莫天體儀若也葢天體儀乃渾天之全象而其爲用則又諸儀之用之所綂宗也然諸儀中最爲難制者亦莫若天體儀爲夫畢肖乎天形且便于用之爲難也其難于畢肖天形者難以取圓故也其難便于用者難于周圍均輕而無偏垂故也其取圓則以子午圈或地乎圈爲凖先應分子午圈劃爲四象限見第六圈次定兩相對之界以爲南北二極每一象限則分爲九十度而兩極各爲九十度之界子午靣則以兩靣度及宇彼此凖對每一度以對角線之比例而另以六十細分又每一分更細而四分之而每四分之一則當十五秒也則以游表識之焉又子午立圈以向東之規靣爲正靣而儀之中心乃正對于斯其南北兩極各作圓半孔以受儀之半軸其他半以伏免圓半孔受之兩半圓相合以螺旋轉定
  hash: sha256:5d04fec4091b8ed099c0105303594d568d42332cf39d7ddedeba6b30d3abc232
