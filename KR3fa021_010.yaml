body:
  text: 壞矣康熙七年戊申冬十有二月洪惟我皇上乾綱獨運離照無私特下明綸有厯法關係重大著議政王貝勒大臣九卿科道掌印不掌印官員會痛確議具奏之旨隨蒙會議題請即奉有著圖海李霨多諾吳格塞布顏明珠黃機郝惟納王熙索額圖柯爾科代董安國曹申吉王清葉木濟吳國龍李宗孔王曰高田六善徐越等厺
