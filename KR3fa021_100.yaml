body:
  text: 乙而兩極上下以圓鋼樞而受儀之全軸焉夫欲儀之旋轉齊圓而畢肖乎天之形體則必以子午圈內規靣之齊圓為凖也欲其均輕而便于用者則又必以權衡之理為凖也蓋權衡之為義本乎天行之平耳夫惟渾天之恆平行是以左右上下無或有輕重之偏焉而天體儀之所為最象乎渾天者大端正在于此輕重學有云平衡之梁其心在中其兩端加重各等一端扶之以手手離自不動矣則天體儀亦然任意旋轉手離則儀不動矣其圓形之心及徑與重之心及徑同在一所故也安儀于子午圈之中行令其輕而形令其圓其象天也如此此制器尚象之為第一義也次之令其凖合于地平圈地平圈其座架約高四丈七寸而座之上下有兩圈上圈為地平之靣寬八寸于子午正對處各閣其口深與子午圈側靣寬與其規靣相等捻以恰容子午圈不寬而亦不隘為當其可焉
  hash: sha256:c3ad7227e1ccc383216a57b7084231ba76269b771a04f44a95b6ba4eef32e107
