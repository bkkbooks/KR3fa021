body:
  text: 明厯者必以儀為記録失推者必以儀而攺正算合者必以儀而參互較厯者非儀無由而信從學厯者非儀無由而啓悟良法得之以見其長敝法對之而形其短甚哉儀象之為用大也如康熙四年間挺險之徒出而恣膽其邪說以俶耰乎天常數年之內或以大統或以授時或以回回諸家之舊厯點竄遞更然無措甚之倒用儀器强天從人乃以赤道儀測新法黃道之所推步而厯典於是大
  hash: sha256:e5bcb4a259253f1028ac71e81e8614b1e862d90ca5381e106f5e7e4bb24598a1
