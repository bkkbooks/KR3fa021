body:
  text: 時憲厯頒行天下事事密合天行故修政厯法先臣湯若望屢奉世祖章皇帝恩綸褒羡將所進呈厯指諸書宜付史館新法之善於斯概可覩巳然厯法雖巳久行猶未鑄有儀象於康熙四年內忽挺險之徒出而撓亂成憲妄用斃法迄于四載矯誣天常曆典大壞幸我皇上乾綱獨運洞察臣之所推驗與天密合者為是復用時憲新法續蒙部議新造儀器併安設儀器臺基應聽工部俱照南懷仁所指速造奉有依議之旨欽此以部臣之庀材督造並臣之指授嘔心以及監員之畢力供事今工巳次第告竣業將諸儀安列於觀象臺上自是諸儀參互並測於以順天而求合當無有弗合者矣然厯有理有數有象有器蓋厯非明天理則舛而理非數則無以顯其徾數非象則無以通其變象非器則無以得其精則
  hash: sha256:60e5d0f8f914c8d8ab04e2e2aa26186604f21f69e4df05797afe37c4a079d880
