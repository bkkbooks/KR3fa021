body:
  text: 對一秒六十往來對十秒二百六十往來對一分若以之定自鳴鍾雖歷二三月之久不調其論牌而分秒無差待此器至中夏之時自詳言其用法第六題凡求時刻之分秒如無諸儀恭測其細微則隨時隨處而以本身之脉息可推而知也蓋人當氣血平和之時其一息大率應時刻分之一秒如當測時切脉而自數其息則以其定秒推之而以球之往來較之假如球每一往一來為一秒而其六十次之往來為一分當彼六十次往來之時若巳之脉息亦至六十次則每一息代秒用之若有過不及之差則用比例法假如球六十次往來之時數巳之脉息至六十八次則一次為比例之共率因得三十四脉息相應三十秒十七脉息相應十五秒餘倣此蓋六十八輿三十四如六十輿三十又六十八輿十七如六十輿十五同一比例之理也
