body:
  text: 三法備而後諸法可次第舉也况夫測天之儀貴恰肖乎天本然之象故其造法亦必以天象爲凖但廣大莫如天也覆冒無外輕清莫如天也徤駛難形堅固微妙莫如天也運行終古而無虧經緯秩然而不紊使非會通而得其全乃漫云吾以制器也則必得此而失彼挂一而漏萬竊恐廣大輕清堅固微妙之四者未有能兼備而無遺者矣説者曰儀之體制鉅則合天爲易固巳然所謂鉅者其徑
  hash: sha256:6a53b5c7bfd43d6d670c5b1af5093da568e001822b0066104ecac37d6fad771e
