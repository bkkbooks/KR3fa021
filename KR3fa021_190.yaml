body:
  text: 異色之體輕重比例表此表之用法有二其一求兩等太異色體之輕重差其一求兩異色等重體之大小差兩法從先所引輕重學之一題而生若求兩體輕重之差則以其輕體者當一或斤兩等分若球本體大小之差則以其重者當一假如球蠟與銅輕重之差蠟比銅輕則蠟當一而
