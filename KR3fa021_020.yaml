body:
  text: 不使其毫髮之或謬斯巳也但儀為小天之形未免拘限要能合符天象無所過差此其作儀之難者一也今諸儀巳成界線布星固稱詳密矣然又使安置無法則窺測不靈而儀亦歸於無用矣此其安儀之難者二也且古來皆重正南之向然或稍偏東西則何所取以為定如勝國先所營觀象臺在當時作者以為諸儀正對之規模萬向之標的由今察之其正面方向正南北線巳多乖遠何論東
