body:
  text: 測地半徑之法地半徑者凡測天及諸星大小近遠之其度蓋地經線度與天經緯度相應也其測里數之實繁故另繡有東西二與圖剖渾天之半以約定其經緯焉兹姑舉其一端如後假如乙丙為海水靣甲乙為高山見九十八圖在海邊上求其高于海之水平靣丈尺幾何先用象限儀而測定之次又用象限儀從山頂甲窺水靣盡處丙則甲丙線切圓形于丙而于地半徑戊丙作甲丙戊直角見幾何原本第三卷第十八題次從乙引長切線交甲丙線于巳而同丁戊線相過于丁蓋甲乙巳三角形內巳甲乙角係若干度分從象限儀窺衡表明見之而甲乙巳角為直角則依勾股法而推知甲巳并乙巳線丈尺幾何然丙巳線與巳乙線相等則甲丙全線之丈尺可得而推也又甲丙戊三角形內既得其三角并甲丙線之丈尺則依勾股法戊丙地半徑之丈尺亦可得而推也
