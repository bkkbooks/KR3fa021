body:
  text: 人體及禽獸行動之勢可明而推之于他類也人體當竚立之時全托於兩足其兩足所立之地愈大而寬則其身體愈穩矣人體與獸體之所為托載者與儀之架座正同一理故架座愈寬則其所托之重物愈穩也蓋物重徑如丙丁在架座之中四方離座邊愈遠則重物愈難仆矣見二十八圖夫人以至於獸行動之時其身體之重心左右那離不斷則其重徑亦因之那移而不斷假如提起右足之時其身體必偏於左而獨托於左足故其重徑丙丁徑過左足提起左足之時其身體偏右而獨托于右足設使人竚立時而提起右足若不偏身於左必不能立而仆矣見二十九圖又如人坐之時見三十圖其胸與股其股與足皆為直角又若人欲起而立必身體之直角形變為鋭角之形即胸并手那移向前而足向後見三圖自令本體之輕重均分於重徑丙丁之過圍若不變通其力使之輕重邊均則如三十
