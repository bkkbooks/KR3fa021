body:
  text: 兩對其所倍之力更大假如一對滑車其近遠兩架各四輪則共八輪其力之加大爲十倍今有兩對相連之滑車其近遠兩架各有二輪則共八輪與前同而其力之加倍爲二十五倍與前大不同也凡用滑車運動最重之物必須絞架所以倍加其力也假有相連兩對之滑車于此各有四輪而有人在丙用四十斤之力則能動一千斤之重若又添絞架其絞柄于其絞柱之徑如十與一則以四十斤之力能動二萬五千斤之重故絞架與滑車互相爲用也若獨用絞架則其所繞絞柱之一单繩不足以當二萬五千斤之重若獨用滑車則其諸繩雖足當乎重物而其倍力之比例實不及矣若用絞架連用滑車則合力當之而有餘焉又其所繞絞柱雖仍有一单繩而此一繩則能當雙繩相連八繩之力也凡此倍力之所以然詳見舉重學內兹不具載
