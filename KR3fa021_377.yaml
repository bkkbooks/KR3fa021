body:
  text: 第七題擬天以下之疾行比而推天以上之疾行近今有測量名家依前定秒微諸法會驗放小銃時于三秒內其彈行一百八十二丈之遠設使此彈常飛行空中而不斷則必閲十一年零一百一十八日而其所行不能盡太陽一日所行之度也照此推算則六十秒即一分內行三千六百四十丈之遠而六十分即四刻內行二十一萬八千四百丈之遠若九十六刻即一日內行伍佰二十四萬一千六百丈之遠今以丈數歸之里數凡一里既為二百一十六丈則前所計丈數共為二萬四千二百六十六里一百四十丈也然地球每一度為二百五十里算之則天下周圍共九萬里而銃之彈一日止行二萬四千二百六十七里矣若行至九萬里之遠則必須三百零六十八刻有餘歷學公論日地球之全徑其在于太陽天之全徑者如一輿一千一百四十二之比例今周與周如徑與徑
  hash: sha256:fa35ce623830ba7901b6efe1c1cbda6a0e2d87e78458c9350d78cfcacfcd6a65
