body:
  text: 右各三十度每度則六十分每一分又十細分則一度共六百細分而每細分則當六杪蓋與象限儀之分法無殊也其弧上有游表者三其表之平靣有三界線長孔孔內之方形依本法與圓柱表相等焉夫儀之全體則用權衡之理以定之蓋取其重心以為儀心耳至如儀之座架有兩端一為三運之樞軸一為承儀之臺夫三運之器加于儀之背靣定于儀之重心以左之右之高之下之平之側之無所施而不可故又名百游之限紀儀焉其三運之器所以成之者有三其一圓管內有圓軸橫入之便于高下運用也其一半周圈其中心與橫軸之中心正同便于平側運用也其一立軸則便于左右運用焉以圓管定于儀之重心而半周圈與橫軸之心并立軸之上端有小圓柱以為平側運之軸而立軸所容半周之處則內有山口以容之外有螺柱以定之此輕小之儀之最便法也今
  hash: sha256:83460df90f87569bac2cd5ae0360b91af54a9ef51ec7f1d5cb82ef29f138da76
