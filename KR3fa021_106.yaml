body:
  text: 度為心即黃道極用規器作圈而定黃道以二分二至四象限分之每象限則三官每官則三十度而每度依對角線之比例分六十分此為黃道之經度也至于赤道則自西而東分三百六十度以春分界為初度此赤道經度也兩道緯度依過分過至兩圈而定焉次又以赤道南北二極為心相距三十九度五十五分為界而用規器作京師恆見界圈又以黃道南北二極為心而黃道南北各作兩圈兩圈互相距三十度各圈所分之宮度數輿黃道圈之宮度數相對次于黃赤二極及于天頂即地平之極加匾圈四分之一以定黃赤及地平各圈之緯度總命之日緯弧以九十度分之每一度依對角線之比例以六十細分之故緯弧之寬以對角線之長方形及所刻度數字為定則其劃度分從下而上即從黃赤地平各圈之經度界定初度而起緯弧各有橫表上下任意轉
