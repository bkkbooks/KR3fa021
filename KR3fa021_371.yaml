body:
  text: 來之方數必短者于相等時刻徃來之方數假如兩埀線球甲乙甲球之埀線長一尺乙球之埀線長二尺試觀甲球徃來八十五次之時則乙球必徃來六十次耳然六十之方數卽三千六百與八十五之方數卽七千二百如一與二夫八十五之方數雖本爲七千二百二十五而其與前方數有微差原從埀線徃來之摠數而生若論其細分卽無差矣葢埀線一徃一來各有細分但難以分別之又設若乙球之埀線長三尺甲球之埀線仍一尺則甲球六十次徃來之時乙球之徃來必一百零四次而其方數卽一萬千八百十六與三千六百約如三與一也第三題有兩埀線球甲乙除埀線長短不等其餘相等以甲球徃來之數求乙球徃來之數法日甲球徃來之方數與其埀線長之尺寸分厘相乘而所得之啇數與乙球埀線長之尺寸分厘歸之又歸除之啇數依開方法
  hash: sha256:8d57c32bc4ac164a8a9cbf83b8d7df9428a36a5055d3e4d2e0b2325210dfb3c6
