body:
  text: 來之方數必短者于相等時刻往來之方數假如兩埀線球甲乙甲球之埀線長一尺乙球之埀線長二尺試觀甲球往來八十五次之時則乙球必往來六十次耳然六十之方數即三千六百與八十五之方數即七千二百如一與二夫八十五之方數雖本為七千二百二十五而其與前方數有微差原從埀線往來之總數而生若論其細分即無差矣蓋埀線一往一來各有細分但難以分別之又設若乙球之埀線長三尺甲球之埀線仍一尺則甲球六十次往來之時乙球之往來必一百零四次而其方數即一萬千八百十六與三千六百約如三與一也第三題有兩埀線球甲乙除埀線長短不等其餘相等以甲球往來之數求乙球往來之數法日甲球往來之方數與其埀線長之尺寸分厘相乘而所得之啇數與乙球埀線長之尺寸分厘歸之又歸除之啇數依開方法
