body:
  text: 之又記讖之次從午前所對設更斗兩所測相距之度數以本地平之表平分之此表平分之線為本地平圈上正南北之線若依恆星為據則不拘何夜候測名星在巳申兩位之時與侯測太陽同法同理也若夫地平緯儀即象限儀其安法以天頂之垂線為定蓋象限儀背靣有垂線球其線必須與本儀之半徑線正對與本儀之立柱須常平行故立柱下端四靣有螺旋轉柱進退螺柱見九十六圖東西南北務求垂線凖合于背靣之所記讖則安法得宜而全儀合于天元頂圈矣夫天體之安法以子午並地平兩圈為定其法以地平下所安之輪進退子午圈或南或北使之齊北極高度凖合于本地應天之北極之高度次地平圈上靣以垂線為凖其定四靣方向之法大約似地平經儀之安法若欲取天體之便而定之則本儀上于某時刻太陽所躔之度分立直表次用前所
  hash: sha256:a7245cbf0cdb40b5440833253f72c7802cc6c0d8f159b3e48f8196f9e3dba291
