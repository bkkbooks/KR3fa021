body:
  text: 體之重自垂而橫斷矣總而論之甲乙柱之斤兩與本柱之斤兩並其所繫於丁斤兩之加倍如五尺與二丈一尺七寸之比例今於二丈乙尺七寸再加本柱之長五尺而三倍之其積數共得八丈零乙寸若此數并五尺之數中取中比例數得二丈即所求甲乙柱之尺寸矣從圓或方柱之理可推他類從五金之柱形可推他形并材料又筋系麻等繩堅固之力同一比例之理以上摁論依勾股之理方圓等柱堅固之理今依勾股之弦斜向之柱萬變不同其堅固與否其自弱而垂下之勢若干皆照其斜向之勢若干欲明此理必須先知方圓等柱各依勾股各弦之斜向加减本體之輕重若干而後可也詳載舉重學論內
