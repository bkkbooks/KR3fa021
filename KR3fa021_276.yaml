body:
  text: 依鍼盤第五方之向從北極高五十三度十二分行過二千二百五十里變之爲度相應九度求本舟見在北極之高度幾何法曰第五向下查九度相對有何緯度卽得五度次以五十三度十二分减五度餘四十八度十二分卽本舟所見在北極之高度分也自北之南則緯差度减自南之北則緯差度加第三題有兩處經度差及方向求其緯度假如甲處在第三十度之子午圈下本極在地平高二十三度從此地徂東北依鍼盤第四方之向舟發而至丁處卽四十五度子午圈之下兩處經差爲十五度求丁處本極在地平上度數幾何法曰查第二表右直行內兩處經差卽十五度而第四向下縱橫相遇放得十四度四十九分卽爲兩處緯差徂北緯度加卽丁處之本極必在地平上三十七度四十九分也若兩處經差度外另有分數則用三率法
  hash: sha256:72b588abc0353777e539ce0d2a5726354bac87e4f9167d2d815f20492971be7c
