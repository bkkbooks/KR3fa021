body:
  text: 圈四面相對之半徑皆出于一球之中心此作儀之難也然而儀之合天之細微亦即在此如天球黃赤各儀安于子午圈南北兩軸若其軸纖毫不對於子午圈之中心則球必偏于東西蓋照子午圈正面於球面上下相對處畫線而轉球令上變下則上相對時下必有過不及之差欲正之必須那移南北之軸子午圈向內向外以其過不及之差若干為主汯曰依此全差四分之一而那軸則得其宜其畫圈度數分秒等線之規短并取直取平取方取圓等比例尺甚繁一併繪圓見於別卷
