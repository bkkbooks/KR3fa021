body:
  text: 西與上下左右哉蓋儀中各道各圈各極各經線之度分在天固有相應之元道元圈元極元經線之度分也彼此互相照應者也假有一端之不應則測候即有不合者矣然安定正對之法既得矣苟用之未能通變反誣良法有不合天者此其用儀之難者三也世更有未當用儀窺測妄云星緯間有錯行而不知天度有一定之理儀象為證天之器間當出所撰著巳辨其誣而
  hash: sha256:d049acfa03c15e7a5dec067b824dd35fbff66cab38f9df9295a26f4914ffb7f4
