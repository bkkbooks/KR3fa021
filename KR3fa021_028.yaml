body:
  text: 欽天監治理厯法臣南懷仁謹奏為恭際欽造之儀象告成益幸合天之厯法有據謹按器關明著有書表繕塵御覽以光國典事竊惟古帝王之治厯所以正天運定歲攻而節宣和氣為布政敷化之基誠為那之首務也粵稽堯之命羲和也則日欽若昊天厯象日月星辰敬授入時而舜於受命之初在璿璣玉衡以齊七政蓋以為治莫大於明時明時莫先於觀象觀象莫先於制器虞書之文可考也逮於後而其制蕩於秦火西漢以來攺厯者七十餘次創法者十有三家而其中肇造儀象者不多概見即間有所創鑄或於一時之用而不能經遠或合於一事之宜而無當全用制器尚象蓋者斯之難也我大清聿與定鼎膺厯數攺正朔蔄用新法命為
  hash: sha256:66fd1ceeca406aaa7552ae751a7003ac62197296bf9e7acbf13e6673f7bbc4d4
