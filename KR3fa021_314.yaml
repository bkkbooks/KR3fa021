body:
  text: 則使之各摩上球甲至刻之一二分一分即六十秒定分秒之法有本論大約以脈一至可當一秒視水升降若干則兩人之氣質分矣醫者用是法可定病之輕重進退亦可以別藥材花草等香味力氣以定其性之溫熱平冷其用無窮也又以測太陰金木等星之情氣者言之或日天星之光下照必同帶熱氣今欲辨之則用此器而對太陰之光則乙庚之水必退分數而向地平若有他物遮隔其光則水必上地平而歸原數故知太陰之光全屬冷氣測金木等星之情氣皆倣此但星光愈微則所用測器必愈大矣又以升降之所以然者言之夫水之升降為熱冷之效固矣然其故何也蓋如上球甲一觸外來熱氣則內所含之氣稀微舒放奮力充塞則求隘既無所容又無隙漏可出勢必逼左管之水從地平而下至丁右管之水從地平而上至戊矣此熱之理所必然也若冷之理則反是蓋冷氣與凡所透之物收斂
