body:
  text: 皇上欽若授時之治未必無補高於萬一也謹兹繕寫編次成軼恭進御覽抑臣更有請焉是書理數兼明圖表備載樊然其不齊也鈔謄不昜繪書為艱使非版行勢難盡人而給且無以遺久仰祈敕部鏤版一副交臣印刷以資給發官生則守是業者皆手習念公勤慎克低有成伏望於與事諸員皆急公勤慎充底有成伏堅我皇上憫其微勞量加優叙以鼓後效則亦國家酬庸激勸之典也臣從厯法起見字多逾額如果鄒蕘可採伏乞睿鑒施行臣謹將所著書表稽首進呈臣無任悚仄屏營之至為此具本親齊具奏以聞康熙十三年正月二十九日具奏二月初
  hash: sha256:924535ae93906b3931efff780b54577a8f2547e36ea14889ddcdfa03fb2ebfea
