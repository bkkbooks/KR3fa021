body:
  text: 上下層次及遠近相距一定之度列宿諸行之細微與夫七曜各有本道而諸道各有南北不同之兩極又各有本道所行各與地遠近與其行最低最高之處皆各有定期又皆各有本體一定之度分五緯各有遲疾順逆諸行之不同亦有留而不行之定日凡此象數萬端難以測量之際要皆恃儀象而為之準則焉故作厯者舍測候之儀而欲求厯之明效大驗蔑由也是以稽厯者必以儀為依據
