body:
  text: 新儀用輪相連以便運動天體紀限諸儀皆宜用輪相連法以便運動之蓋天體儀之廣大重四千斤其妙用在可對乎天下各省北極之高度夫人之目雖不離於京師觀象臺之一處然究其可見者則在各省之天象與在一處無異也故特用大小輪法以便運動而對於各處北極之高度用此輪法則用四斤之力而能運四千斤之天體也若紀限儀原為百遊之儀亦用此輪法以便對於天之正斜左右上下百遊之放向而轉動之所為輕便者在大小輪相連一定之比例蓋大輪之徑比小輪之徑天寸有若干見人十四圖則即省轉動之力有若干如有輪架五對每一對有大小兩輪同在一軸每大論與其小輪之比例如五與一五對輪相連大橃小而同為五倍相連之比例今推算其力如有一孺子于此止能用一斤之力若用此輪
