body:
  text: 圈半徑之比例若干則知騾馬用力干刮刀重壓之斤兩若干矣又刮刀輪必須預備磨刀輪法見三十七圖其作法其轉動之勢并其所用力之比例與刮刀輪之理無二但刮刀架之下安磨石而上安壓石于壓石之上又安自漏水筒以便于磨平之用見三十八圖如刮刀輪與平磨輪之功巳畢則銅圈內再定中心此中心應定于銅片上而銅片則穩釘重大之木上而在銅圈之正中見三十九圖其木之兩端不可抵于圈須稍離一間否則失其圓形矣次用兩螺旋轉展縮其定規見四十圖甲乙其前後兩端螺柱之下定心并畫圈線之表皆為銅尖表一表定中心一表循銅圈適圍內外過不及之中邊而內外劃兩界線之圈此面巳定則又于本圈之下面亦劃兩界線圈而與上面之圈正相對若不正對則內外銅圈邊必斜其上下兩面之圈及度數不出於一圈之同心而以之測天則大舛矣故圓圈
