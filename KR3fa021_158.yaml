body:
  text: 又細巧而不蔽於儀此固善矣且各儀之四圍層級其石以爲階使窺步者登降從心有快於目則尤其法之曲葢也其一則難對定葢簡儀衡表及內圈必須一二人之力以轉動之此一轉動也亦必用力强推之勞難從容漸次移對夫度分也至若渾儀必更藉數人之力以轉動焉是豈可施之于用也哉若夫新儀則不然形製雖較舊儀加大而運旋則甚靈敏也如象限儀黃赤諸儀一舉手而可以轉動且元明之儀每種極其重滯假使地基傾陷或地有動時儀卽因之而偏垂矣若欲安對非需數十人之力不可也夫元之渾儀縱有可用然不過如其厯法用之于燕京不能通于各省也原夫南北兩極與子午圈皆爲一定而上下不能轉移故耳若新製之儀無論地基之有所傾陷與地動之有所偏垂一俄頃間而一人之力卽可以安對而有餘葢新儀各依舉重學之法有螺旋轉
  hash: sha256:65a4b4c9414f12c4bae24217227f0701f0c663421108f402ff3722bf358bc97f
