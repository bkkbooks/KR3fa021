body:
  text: 新儀用螺旋轉以便起動諸儀中最有力者螺旋轉也其作法之巧妙與用法之廣大及其運動省力之理甚微故新造之諸儀俱用之螺旋轉上端用絞柄開之旋之緊鬆之其絞柄之尺寸比螺旋轉之半徑若干則其省力亦若干如新儀并座架共有四五千斤之重今用一寸徑之螺旋轉又加一尺之绞柄則雖一孺子用數斤之力而卽能起動之若照比例相連之法用螺旋轉彼此相撥之法則用一斤之力者而可以起數萬斤之重也葢此相撥之器具一動而有無所不動之勢故其力爲甚大也其螺旋所以省力之故則在勾股形之弦與股一定之比例見八十七圖并詳于舉重學內則其本論爲甚明也
  hash: sha256:574f7a54e849a56bca16cd3240256c2b35970cfd02651c252252d3eaf56bf354
