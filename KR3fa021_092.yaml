body:
  text: 紀限儀紀限儀之全圈則六分之一卽六十度之弧也亦名距度儀全儀分之爲二一幹一弧見第五圈幹之長與弧之半徑及弧之通弦皆相等卽皆六尺也弧之寛二寸五分此儀之難製在于其幹何也葢用儀之時其幹大概離天頂而左右上下移動之衡斜向地平故幹愈長愈軟而愈垂下不合于儀之半徑欲令堅固恐銅加厚而儀不便于用故用二稜角形之法而左右上下之旣堅固亦復輕巧則用以合天使之彼此不相反也幹之上端有小衡以十字直角相交于弧之半徑線下端入弧之中夫幹及弧併小衡之上靣皆在一平靣令儀合于本圈而便測騐故耳又左右皆有細雲彼此相連葢藉之以堅固全儀者也者夫儀之中心及小衡左右之兩端各定有一表皆圓柱左右各表之徑線相距中幹之徑線本弧之十度弧之度分從其中線起筭左
