body:
  text: 其一天下各地萬物生長變化之功皆原太陽及諸星循四時之序照臨而成也在各國之地平上下高若干因而剛柔燥隨之而萬物各得其所冝耳今使地之兩極不必異為向天上之兩極而離之或於上下或於左右則是天下萬國必隨之而粉擾動搖將衆在乎赤道之北者忽昜而為柔道之南赤道之南者忽昜而為赤道之孔近者遠遙者變近夏之熱忽變乎冬之寒則四序顛倒生長變化之功因之大亂而萬物滅絶矣審乎此則地之南北兩極恆向乎天之兩極旦萬古而不移也夫何惑焉
