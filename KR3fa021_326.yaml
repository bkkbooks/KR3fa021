body:
  text: 甲若圓球形之器內無水測其光道與表影在圓器內依徑線正射八十度矣若充其水齊邊測其光道止射五十度矣因而通氣通水之光道差三十度為其玻璃差者則光或是物象同一理從空明之器透玻璃離於徑線近遠之差也見上氣水差之圖而以丁線為直徑線以水盈之圓球形為玻離球形也凡玻璃望原顯微等鏡其所以發現物象近遠大小暗明正斜之衆端皆可從此差之理而明之詳見本論水氣差者則光或物象從水中升出而射空明之氣其所以射光之線水內氣內各離頂線近遠不同之差也假如射光之道其在水內離頂線五十度其在空明氣內離本頂線六十五度兩差十五度則此推表之度數凖合於儀器之所測矣詩於大盂內照氣水差表製界節氣線日略盂中注水與表端齊則太陽之光照表其表影盂底正對於本日節
  hash: sha256:797ad8e699ac6c791b19e90b4a2467128f82809da0efb6512e95382b214505ad
