body:
  text: 惟月天略有可比之理因有數分地半徑之差而生也夫儀之重心以地之中心亦為定向蓋凡重物之體自上直下必欲至地心面止者是也試觀二十四圖甲為地球之中心乙丙戊皆重物各體皆直下向地心而方止蓋重性就下而地心乃其本所故耳譬如磁石吸鐵鐵性就石不論石之在上在下在左在右而鐵必就之者其性使然也何况地之中心六合內最下之所物離其中心不得為下必為上也此地道寧靜而永不動之故也蓋凡謂下者必遠於天而就地心凡謂上者必就天而遠于地心而地一圓球懸于空際居中無著常得安然而四方土物皆降而就于地心之本所東降欲就其心而遇西就者不得不止南降欲就其心而遇北就者亦不得不止凡物之欲就者皆然故凡物相遇之際皆能相衝相逆故凝結於地之中心即不相及者以欲就故亦附靇不脫致令大地懸
