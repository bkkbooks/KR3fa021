body:
  text: 惟月天畧有可比之理因有數分地半徑之差而生也夫儀之重心以地之中心亦爲定向葢凡重物之體自上直下必欲至地心面止者是也試觀二十四圖甲爲地球之中心乙丙戊皆重物各體皆直下向地心而方止葢重性就下而地心乃其本所故耳譬如磁石吸鉄鉄性就石不論石之在上在下在左在右而鉄必就之者其性使然也何况地之中心六合內最下之所物離其中心不得爲下必爲上也此地道寧靜而永不動之故也葢凡謂下者必遠於天而就地心凡謂上者必就天而遠于地心而地一圓球懸于空際居中無著常得安然而四方土物皆降而就于地心之本所東降欲就其心而遇西就者不得不止南降欲就其心而遇北就者亦不得不止凡物之欲就者皆然故凡物相遇之際皆能相衝相逆故凝結於地之中心卽不相及者以欲就故亦附靇不脫致令大地懸
