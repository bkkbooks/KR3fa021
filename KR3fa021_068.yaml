body:
  text: 即開螺柱而安經線以代表任意用之其軸之中心立圓柱作緯表表之從徑與黃道中線正對下與緯圈側靣恆定為直角而黃道經圈緯圈各有游表數具于各弧之上游移用之又當天頂設極細銅絲為垂線下置垂球至下圓孔之內全儀下有雙龍于南北兩邊而承之龍之後足安置于兩交梁兩梁則以斜角相交而收斂之令其地寬裕而便于測驗又交梁之四角有四獅以頂承之而上則有螺柱定之黃道圈其一側靣分刻十二宮每宮三十度其一側靣分刻二十四節氣每節十五度內外規靣宮度節氣分相應之但規靣比側靣寬大便于刻度分秒其每度之所容者以縱橫線界之而成長方形每一方又分六小長方即一度分六分也方上下橫線短小難容細分因用其對角長線而十分之蓋規靣上平行十圈線與對角線縱橫相交每小方分
