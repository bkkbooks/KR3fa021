body:
  text: 移之以定緯度之分黄赤二道之緯弧上端有圓孔以安之于本極下端有一匾弧以十字直角形横交之以宻合于本道之經度線焉葢線弧必以直角交本道之經圈橫條之長約緯弧之二十度其寛舆緯弧等若地平之緯弧亦名高弧另有製葢高弧及天頂悉依北極出地度安置故子午圈上抱合天頂另有游表中開以長方口以入子午圈下出小螺柱按貫高弧上端不脫表正靣另有螺柱轉可以任游移而定之于天頂高弧下端則另有表如平足舆地平上靣平行足底有如突起之形入地平上周渠如坳入之形而以直角交地平經圈以定其度分也其黄赤二道經緯之度全傋如此則二十八宿星座等天象有定位矣有次第矣夫星宿依黄赤等各道之經緯度布刻儀靣之上以本象線聊之以大小六等印記别識之以黄道十二宮次界線各于本宮次摠歸之葢黄道每一宫
