body:
  text: 移之以定緯度之分黃赤二道之緯弧上端有圓孔以安之于本極下端有一匾弧以十字直角形橫交之以密合于本道之經度線焉蓋線弧必以直角交本道之經圈橫條之長約緯弧之二十度其寬輿緯弧等若地平之緯弧亦名高弧另有製蓋高弧及天頂悉依北極出地度安置故子午圈上抱合天頂另有遊表中開以長方口以入子午圈下出小螺柱按貫高弧上端不脫表正靣另有螺柱轉可以任遊移而定之于天頂高弧下端則另有表如平足輿地平上靣平行足底有如突起之形入地平上周渠如坳入之形而以直角交地平經圈以定其度分也其黃赤二道經緯之度全傋如此則二十八宿星座等天象有定位矣有次第矣夫星宿依黃赤等各道之經緯度布刻儀靣之上以本象線聊之以大小六等印記别識之以黃道十二宮次界線各于本宮次總歸之蓋黃道每一宫
