body:
  text: 圈表之衡則甲乙丁為大圈之半徑而甲丁戊角為負圈角幾何原本云詳見三圈二十題負圈角與分圈角所負所分之圈分同則分圈角必倍大於負圈角蓋甲乙戊外角與相對之內兩角乙戊丁角及乙丁戊相併必等今乙戊丁角與乙丁戊角相等則甲乙戊角倍大於乙丁戊角明矣故象限儀甲丁戊負圈角之度分倍大於甲乙戊分圈角之度分今按前所論此圈之度分與彼圈之度分大小若干則此之徑與彼之徑大小亦若干此論線之比例也若論面與體之比例又不同矣蓋線與線如一與二為單比例此面與彼面相比如一與四為再加之比例此體與彼體相比如一與八為三加之比例如元之渾天與今之天體相較比例之多寡有三焉蓋渾天之徑線四尺四寸不及天體之徑線約有六尺則徑與徑如四十四與六十此為單比例就徑推儀面則元儀面與天體儀面約有四
