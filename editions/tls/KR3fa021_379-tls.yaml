body:
  text: 之比例則太陽天週圍之里數包地週圍之里數一千一百四十二倍也若照前所擬銃彈行空三日而不斷則必湏四于二百三十三日卽十一年零一百一十八日始行盡于太陽天一日内所行一週之里數矣又恒星天全徑與太陽天全徑如十二與一則恒星天一週包日天一週十二倍也故夫銃彈以行盡太陽天之數推之則必湏一百三十九年零八十四日始行盡于恒星一日所行之里数矣然凣此天行之疾則又有何所比擬哉作法假如六十四圖庚辛爲銅横條釘穩于横木梁上令毫不動搖壬丁戊巳爲粗銅耳中安銅軸而軸長徑線丁戊湏與地平線平行軸中繋垂線球其球隨本横軸轉動恒當甲丙過天項一圈線之中徃來而不離於左右其軸之長徑線埀東之徑们等以便自此軸中心至球之中心北測而定埀線长短之尺寸分
