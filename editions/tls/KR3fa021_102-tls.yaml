body:
  text: 至兩圈內規靣平合而左右上下環抱乎儀周圍則須留五分之鏈爲便于安高弧而進退游表隋用規器於地平上靣多作平行圈線以別度與字之間處必于劃度處展之于劃宇處縮之便以長方對角之線細分官度地平之上靣共分內外中三層內層劃有地平經度分四象限而各爲九十度其經度之上下則劃有度數字平距圈線內外界之上所刻字以正南正北各爲初度以正東正西各爲九十度界下所刻字反是以爲測騐時便干用故耳內層則以周渠爲限界渠之深寛相等卽五分內堪容高弧之足卽地平經度表也自周渠以外則地平中層矣其上下平距圈線者卽線界京師地平日晷時刻也每一時分八刻而每一刻則十五分午正初刻卽自子午圈正靣南邊交地平而起子正初刻相對于兩圈北邊相交處日晷源表者卽天體過南北之軸也
