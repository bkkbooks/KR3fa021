body:
  text: 乙而兩極上下以圓鋼樞而受儀之全軸焉夫欲儀之旋轉齊圓而畢肖乎天之形體則必以子午圈內規靣之齊圓爲凖也欲其均輕而便于用者則又必以權衡之理爲凖也葢權衡之爲義本乎天行之平耳夫惟渾天之恒平行是以左右上下無或有輕重之偏焉而天體儀之所爲最象乎渾天者大端正在于此輕重學有云平衡之梁其心在中其兩端加重各等一端扶之以手手離自不動矣則天體儀亦然任意旋轉手離則儀不動矣其圓形之心及徑與重之心及徑同在一所故也安儀于子午圈之中行令其輕而形令其圓其象天也如此此制器尚象之爲第一義也次之令其凖合于地平圈地平圈其座架約高四丈七寸而座之上下有兩圈上圈爲地平之靣寛八寸于子午正對處各閣其口深與子午圈側靣寛與其規靣相等捻以恰容子午圈不寛而亦不隘爲當其可焉
  hash: sha256:a0c75a05a5d24e11582710409d5dfb22e1dd353126fdfc817ff8b0a8fa1c0e20
