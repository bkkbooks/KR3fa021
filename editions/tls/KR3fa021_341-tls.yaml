body:
  text: 測空際異色并虹霓珥量諸象格物家論色之異有二一真實一幻妄何謂真實葢從寒熱燥濕四元行之情相交而生然必雜體可見而純體不可見也何謂幻妄葢從光照物體退返之勢而生雖易顯著亦易涣散夫二者亦各分五等正相反者有二純白純黑是也又中等者有三黄紅青是也由是五等彼此相交相變而各色生矣見一百十一圖姑以各色玻璃相交映之勢言之于一宻室中戶牗皆閉務令幽暗或戶或牗微開一隙其大小舆玻璃相稱而以通日光隙内置各色玻璃用絜白紙對之其日光透射玻璃玻璃所映之色必映于紙上如隙内並置玻璃兩片一黄色一紅色者則紙上必現黄金之色矣如並置兩片一黄一青者則紙上必現绿色矣如並置兩片一紅一青者則紙上必現紫色矣餘倣此若以銅圓柱鏡對于通日光之隙則周圍返照之光而五彩虹霓之象
