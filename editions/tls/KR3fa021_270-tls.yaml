body:
  text: 地靣及水靣上測經緯度法地水球週圍亦分三百六十度以東西爲經以南北爲緯與天球不異見全地圖泛海陸行者悉依指南針之向葢此有定理有定法并有定器定器者卽指南鍼盤所謂地平經儀其盤分向三十有二如正南北東西乃四正向也如東南東北西南西北乃四角向也又有在正與角之中各三向各相距十一度十五分共爲地平四分之一也自南北徂東西起數而各方向線乃其過頂極交地平之大圈也其鍼愈長而輕則所定方向愈凖但其長短勿令有過不及之差而製法務須合於吸鉄石之有力者則自凖耳見一百零一圖指南針及鍼石之性另有本論此所謂定器也定法者凢人之遠行或陸或海皆依鍼盤之向線而行其道列有三等凢正南正北行者則以地緯度而定其里數之遠近焉凢正東正西赤道下行者則以地經度而推其里數之遠近焉其或行于赤
