body:
  text: 測中域雲高度之法假如空際有雲象見一百十圖其一端爲甲兩人各同象限儀一從乙處一從丁處從丙處更便測其高度因于甲乙丁三角形内得其三角并乙丁線之步數故照法推知甲乙線今以甲戊線爲從雲而下之垂線甲乙戊三角形内旣得甲乙線而甲戊乙爲直角則依勾股发之理推知甲戊線之步數而可得雲之高度矣虹霓詣類之高度舆雲象諸測法皆倣此其測彗孛新星等另有本論若測雷起處距地近遠等則以測時刻分秒之垂球儀可推而知也詳見别集
