body:
  text: 其名透而東西南北渾天之星無不明顯而可以對照焉觀新儀之圖象則卽了然於心目間矣其一則難窺測葢儀之四維多粗鋼交梁立柱座架諸類非但爲象緯之障抑且遮蔽人目甚不便於窺測也况測天之法必以多人叅同窺測爲凖今新儀備極玲瓏東西南北無所隔礙使窺測者之目上下左右諸圈諸表無不豁然而易見如黃赤兩儀其經緯諸圈虛懸於中惟南北二角餝以細身之龍爲之座架而並無所礙也地平經儀從地平周圍至天頂無所不見象限儀亦然若夫百遊紀限儀較之諸儀更爲活潑而易於對照凡天上正斜橫諸道及諸星之行度皆可任意以測之焉至于天體儀之諸星諸道較在天之諸星諸道明晰無異也舉地平下并南極宻近之諸星諸道舉中夏之人目力所不能至者而今則有如數指上螺文矣是何也諸儀之制皆雲透便於測其架座
