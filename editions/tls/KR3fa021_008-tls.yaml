body:
  text: 明厯者必以儀爲記錄失推者必以儀而攺正筭合者必以儀而叅互較厯者非儀無由而信從學厯者非儀無由而啓悟良法得之以見其長敝法對之而形其短甚哉儀象之爲用大也如康熙四年間挺險之徒出而恣膽其邪説以俶櫌乎天常數年之內或以大統或以授時或以囬囬諸家之舊厯點竄逓更然無措甚之倒用儀器强天從人乃以赤道儀測新法黃道之所推步而厯典於是大
  hash: sha256:0d347e9eabafb344ceecef4d6c4df37c762ef2c195abe54ab370a77ff3856aa1
