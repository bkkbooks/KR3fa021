body:
  text: 真正南北向之線欲定南北之線觀日躔厯指諸法可得矣然欲精審乎所定之線正合南北使無毫髮之差則更有三法以詳之其一用地平經緯儀於冬夏二至相近之日將向所定南北線之東西近遠相同者各取若干度分以太陽於午之前後一交某經度分測其高度若干前後同爲一高度分則向所定之線正向南北無疑矣若干前之高度多則先所定南北之線未可以爲凖而其向南之一端必攺移于東矣應移若干度分則詳見後篇其一天晴時不拘何夜照前所測太陽之法于南北線之東西測定不拘何名星之高度其南北之線應攺與否則以某星午前後之高度異同照前法爲定其一用定時刻分秒之垂球見第四卷垂球儀用法第一題而晴夜測名星向東之高度又從某一定之高度起數垂球之分秒至某星正對於向所定南北之線又從
  hash: sha256:f96b6037a371cd89338909228f16661c6463ee633941d5e64e4c75b5c3828641
