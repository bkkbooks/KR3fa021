body:
  text: 用法手握垂球不急不緩任意離之于頂線見六十四圖假如甲自甲至乙乃釋手方之則球之中心恒當天頂以圈線之中自上下徃來而離頂線其左右則作圈線弧如甲乙丙而其圈之中心在于軸之中心如戊此圈弧短小如將盡時卽照前法提球而放之令徃來一日相繼以定時刻分秒之凖則焉但初放時其圈弧不可太過大略在四十五度之内又從而提之不可等球徃來全盡如將盡則又提球而放之各有定規學者習而熟之無所施而不可也今約舉數題以解之第一題凣埀球以來以徃之单行其相應之時刻分秒皆相等又凣埀球徃來之雙行其相應之時刻分秒亦相等所謂单行者卽埀球之一徃或以來也假若從甲至乙爲一徃之单行從乙至甲爲一來之单行從甲至乙并從乙囘至甲卽徃來之雙行也解日若用
  hash: sha256:4537cf48733be5e8c69f823b2dc15a8974d14c0bd30def2dff70899cef720f6a
