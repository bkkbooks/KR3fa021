body:
  text: 測地靣上高庳近遠表測近遠高庳之法如山嶽與塔閣等其説詳載于新法測量全儀諸書中今以测地半徑之法并其度數演而成表以爲測量法特更舉數題以明其表之用法如後第一題有人目在地平之上高度若干求地平或水靣上見地平界線相距步里遠若干法日查高度表內目高度則遠度表正對之方內得幾丈幾尺卽見遠之之丈里也如人在高阜目向東方之地平窺地平界線而目在本地平上高八丈三尺三寸則其所見東方之地平爲三十七里乙百零八丈遠也見九十九圖第二題有兩人相距里數若干求各從本地空際所能見之天象應高若干法日相距里數平分兩半而其一半之數查遠度表內則高度表相對之方內可得天象應高之度數假如筭此
  hash: sha256:a9297e2699b5b9589f0d61ec92ca6fbd4af43e0e5a4f38e8eed857926bfab4dd
