body:
  text: 赤道經緯全儀赤道儀之有三圈外大圈者天元子午圈也其經線其四靣寛厚其分劃度分之法並堅固其下週之小半而夾入於雲座半圈之内皆舆黄道儀之外圈同又從圈之側靣南北極定度起筭各去九十度定爲赤道經圈見第二圈舆子午圈相交之處兩處各以十字直角相交其圈之内靣舆外靣各陷其中以相人令從横于兩内規靣皆平靣則兩圈皆爲一體而恒定不移也次兩圈内之赤道緯圈管于赤道兩極而東西游轉横相切于赤道之經圈也經緯兩圈之規靣其寛各二寸五分側靣厚一寸三分而南北兩極安定緯圈其内处之規靣上下安以鋼軸鋼樞諸項皆舆黄道同法焉又南北兩極各有獸靣安定于緯圈内規靣之中而獸吻其圓軸以代赤道經表軸之中心立有圓柱以代緯表又軸及柱之經各一寸一分若欲以兩極之經線而
