body:
  text: 爲解説精粗兼舉細大不捐而復圖之以互相引喻總以期乎理精法宻不愧傳流以無負聖天子欽若敬授埀憲無窮之至意也云爾予小臣敢自多其力與謹序峕大清康熙甲寅歳日躔娵訾之次治理厯法極西南懷仁撰
