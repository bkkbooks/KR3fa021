body:
  text: 度爲心卽黄道極用規器作圈而定黄道以二分二至四象限分之每象限則三官每官則三十度而每度依對角線之比例分六十分此爲黄道之經度也至于赤道則自西而東分三百六十度以春分界爲初度此赤道經度也兩道緯度依過分過至兩圈而定焉次又以赤道南北二極爲心相距三十九度五十五分爲界而用規器作京師恒見界圈又以黄道南北二極爲心而黄道南北各作兩圈兩圈互相距三十度各圈所分之宮度數舆黄道圈之宮度數相對次于黄赤二極及于天頂卽地平之極加匾圈四分之一以定黄赤及地平各圈之緯度摠命之日緯弧以九十度分之每一度依對角線之比例以六十細分之故緯弧之寛以對角線之長方形及所刻度數字爲定則其劃度分從下而上卽從黄赤地平各圈之經度界定初度而起緯弧各有横表上下任意轉
