body:
  text: 互相交角係若干度分一測黃道升降度分一測某星同黃道何度分出入地平一測某星同黃道何度分在天中黃道經緯儀之用一測七政諸星黃道經緯度一測黃赤二道相距度分一測黃道子午圈互相交角係度分若干一測某星赤道經緯度一測黃赤二道緯圈于某星互相交角係若干度分一測赤道緯圈于黃道經圈互相交角係度分若干一測兩星互相距度分一測黃道緯圈于赤道經圈互相交角係度分若干一測某星同黃道何度分出入地平
