body:
  text: 數其往来之秒至本曜之東弧與角線并窺目相叅直彼時若本曜行赤道線則以本表查時刻之分秒而變通于天度之分秒卽得本徑之分秒矣若本曜雜于赤道之内外則定其緯度與赤道平行圈相距之度分若干而以本圈之分秒與相應赤道之分秒相對則通變之以求其分秒卽得矣見大小圈度相應表第二題測天上不拘何兩星相距赤道經度之分秒法日照前題測候此兩星與上三角形線相叅直而兩中間凢有垂球徃來之分秒照前发變度數之分秒凣二星宻近用他儀測候難得其相距之分秒用此垂線儀則一仰觀而卽得矣第三題凣重物隕墜所行之丈尺并求其所湏時刻之分秒有再加之比倒其比例以不平分之數而明之如一三五七九十一等假如有重物于此自高墜下若第一秒内下行
