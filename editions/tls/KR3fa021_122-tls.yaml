body:
  text: 象限儀之用法象限儀者地平之緯儀也凢測日或星轉儀向天低昂窺衡以取叅值卽得地平之高緯度凢轉動儀時若其背靣之垂線或有不對于原定之處則其偏內或偏外若干分秒必須與其所測得之緯度或加或减分秒若干葢儀偏于內則用减偏于外則用加也夫地平而分爲經緯兩儀者以便于用而窺測爲凖改也其便于用者葢謂兩人同時分測乃并向于一點以轉動而互用之則赤道經緯度可推也並夫日月五星之視差地半徑差清蒙氣差等無不可推也
  hash: sha256:cbe814d02709fa65585b3d3ba7f5bed7bbe8aa06166c98b81d648980c63b8a2b
