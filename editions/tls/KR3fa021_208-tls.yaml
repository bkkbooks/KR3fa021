body:
  text: 製儀之其與法凡測天之儀必極其精良靈巧以凖合乎天行之細微而轉動以適於用則其事乃善巳是故製儀者欲善其事則必備諸精妙之利器而隨其式變通以作之以務合乎其宜焉則製器之能事畢矣今姑舉其作法之次第如左云凡儀之大圈以依其大小之尺寸鑄造之後則以十字架粗木定其中心而照第三十五圖以爲立飛輪之形安于架上轉動之去其模而大約歸于圓其圈愈大而重旣懸于中心之軸則其轉動愈易而且疾矣葢重物之勢使然耳其次則置圈于別架之上務與地面相平而照圈圓形左右作榆木圈于弧內安定刮刀約二十許見三十六圖刮刀架以重石繄壓銅圈面上用騾馬之力以轉動刮刀之輪而圈之上下兩面務爲刮平又騾馬適圈轉動自行有大圈之路以其大圈之半徑與銅
  hash: sha256:955caa109d43f579a9bcd656f484ef20d058f2057a1a428b4847647acac683a9
