body:
  text: 銖兩之加重而徒以粗厚名也大率在于儀徑長短之尺寸與儀體輕重之銖兩相稱而適均乃爲得耳葢儀之徑愈長則儀愈難承負儀體旣重若又加銅以圓堅固則徑反弱而自下垂如赤道黃道經緯諸規兩端懸于南北兩極之軸若銖兩加倍則東西兩半太重必自下垂而不合乎天上所當之平面圈矣若豎立之則上下兩半又下垂而圓圈又類卯形矣其長圓之徑表兩端定處則中心太重必自下垂而離南北之徑線又象限儀之橫梁紀限儀六尺半徑之幹等皆須與地平線平行而用權衡之理依據于中心之一點若過加銖兩則兩端必下垂而不合于本圈之徑線造儀之難正在於此而儀之凖與否亦卽在于此今更取五金所以堅固之理以明之夫五金等材堅固之力必從人之所推移而見又必從壓之以重物而始見之姑倡方圓柱所承之力以類推焉凡形之長者
