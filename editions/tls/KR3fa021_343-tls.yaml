body:
  text: 俱顯矣至于各色明麗深淺濃淡之加减則隨其圓柱鏡之光有斜正返照之勢而生焉葢圓柱鏡返照之日光愈斜則其所映之光愈昏而其色之變異遂去日之原光愈遠矣若夫真實之色别有闡發今止就幻妄之色而論之大凣有形象者皆由質模作爲四者而成諸異色也其質者卽空際之氣也氣必稍厚而宻方可成色其模者卽光也光道愈宻則各色必愈明麗矣其作者卽太陽與射光之星月也其爲者卽六合品彚之全而萬有之羙也其色之異者或由夫氣質之厚薄或由夫光輝之進退或由夫空際之異勢葢凣光照空際之體厚則其所生之色必深而黑若體稍薄而濕則其色必青若又稍薄則其色必紅若體薄甚則其色青綠若體精而稍厚色則爲黃矣卽日月星辰之異色多爲空際之所映射而致正如火焰之異色由烟氣熏灼而成耳
