body:
  text: 代爲經表用之亦無不可者緯表從横有兩經線其從徑舆赤道圈之中線正對其横徑舆緯圈之側靣恒平行又赤道内之規靣并上側靣刻有二十四小時以初正兩字别之每小時均分四刻二十四小時共九十六刻規靣每一刻平分三長方形每一方平分五分一刻共十五分每一分以對角線之比例又分十二細分則一刻共一百八十細分每一分則當五秒今游表之指線亦平分而每分舆對角線之十二分各有相當之比例又各細分五秒則一刻每分六十秒十五分共九百秒矣如此而分之法可不謂微矣乎又子午圈向東之正靣爲子午線所從起而南舆北兩軸之中心正舆此靣相對以爲分界至若軸樞之半在于此靣而半在于伏兎則兩合螺柱以定之而并如一體焉又赤道之上側靣于子午圈之正南交劃有午正初刻其内規靣劃有子正初刻而于正北交則側
  hash: sha256:c189bf89d9f5171d6029b28f350835bea73c3e55b5cbf741a28270e6741996e7
