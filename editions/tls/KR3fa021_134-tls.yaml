body:
  text: 諸儀之用條目厯法之本在於測驗而測驗之條目葢甚繁也然得其一而他可推得其全而一乃貫今腫列諸儀之爲用各有攸當者數十條使學者有所持循焉至其理之深微法之詳宻則有新法厯指諸書在所當畢慮而研究之者也地平經緯儀之用一測定南北線一測定極之出入地平度分一测定清蒙氣差一測黃赤二道相距度分一測二十四節氣一不拘何時刻測七政及諸星地平經緯度一測太陽最高之處及兩心相距之差一測日月之視差并日月及諸星離地近遠若干一測諸星赤道緯度
  hash: sha256:2c4714998f580e45317aa47dcae3b7d1dfcc86f997b9c87c3a5162df9389eb4d
