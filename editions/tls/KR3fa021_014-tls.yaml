body:
  text: 之旨是年秋八月復蒙部議新造儀器併安設臺基俱炤南懷仁所指式樣奉有依議之旨仁自受命以來夙夜祇懼畢智竭能務求精乎儀象之有利於用而以宻測天行貽爲典則此愚分之所矢素心自盡者也難然儀象之作葢以定永遠之明徵而使後世有以私智自用者無所騁其臆説則其事可易言也哉是何也夫諸儀有作之法有安之法有用之法
  hash: sha256:8f2d2914ce3c65ac974df6f8318431a4e7dfc5830d95c4ab930cebb9b070e786
