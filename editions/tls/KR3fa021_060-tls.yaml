body:
  text: 規而推定焉四儀之外又有百渚之紀限儀旋轉盡變以對乎天凢有或正交或斜交于三規錯綜之行以定諸星東西南北相離遠近之度分不差纍黍摁之天行七政于本圈所列之經緯各道之宮次度分諸星先後相連之序與夫東西南北相距之遠近皆從天體而見瞭如指掌焉故制六尺徑之天體儀以爲諸儀之統且此六儀相须並用則凡礙之于彼者而有此以通之則亦何求不得哉故欲宻測以求分秒無差則必六儀互用相參要以製器精良安置如式測騐得法而無有不合者矣其有不合者則卽推其所以不合之端何在而更爲釐正之使釐正之後測復參差則于諸儀中擇其所測之同者而用之如此而不宻合乎天行者未之有也使止摅一儀以求盡乎天如舊法之簡儀是何可信其爲必然也哉葢舊法黃赤儀膠柱而不運動况止可謂赤道儀無黃極無緯圈無黃
