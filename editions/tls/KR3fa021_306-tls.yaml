body:
  text: 驗氣説氣者四元行之一葢天之於地有上中下二上域近火近火常熱下域近水土木土常爲太陽所射故氣煖也中域上遠於天下遠於地故寒也然則各域之界由何而分今姑以極峻之山畫三界以喻之山之巔爲上域風雨之所不至者也故其氣極清而人與物不可居焉其下爲中域霜雪必爾凝結也又其下則爲下域而其寒煖之分又又輕重厚薄之不同焉若南北二極之下因遠太陽則上下之煖處薄中之寒處厚若赤道之下因近太陽則上下之煖處厚中之寒處薄以是知氣域之不齊也四元行之中惟氣行爲最易變以氣在天地之間上依星辰異照下依土水異情其星辰各有德性而資育萬物者也然各曜又因相會相對之勢而變異其情則其効遂因之面亦異且氣甚微甚順易受諸天之變諸効之桑
  hash: sha256:61d25fcfed5e7489c10114c7430680248dbf3c14bf750de20d5ecf1e18f97757
