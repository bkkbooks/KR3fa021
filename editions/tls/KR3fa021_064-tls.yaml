body:
  text: 黃道經緯全儀諸儀通用之法巳詳於前説矣今更以諸儀所需全法而分論之夫儀之設有諸圈所爲相须而互用之者也然圈少則不雜而儀清其象更爲昭顯而儀之用爲愈便焉如黃道經緯全儀之圈有四各圈之四靣分三百六十度每一度細分六十分其外大圈恒定而不移者名天元子午圈其外徑六尺其規靣厚一寸三分其側靣寬二寸五分此圈之內包括諸圈其衝天頂之下半加寬一寸五分而夾入於雲座仰載之半圈見第一圈欲其不薄弱而失圓形故耳其圈之側靣從天頂起筭南北各去頂一象限卽爲地平線又從地平線起筭上下安定京師南北兩極之高度分於兩極各安鋼軸而各軸之心與圈側靣爲一點側靣爲下半園而合之加伏兎上之半園以收之葢因度分之界指線所切窺表所及皆在側靣故也南
  hash: sha256:86d46dc9ca71d8dc16de1c2df8dffb94d957c5970c0c609d0ae3cf8f777a757c
