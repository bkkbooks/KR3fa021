body:
  text: 新儀體鉅極分秒之明晰凡儀之大小式無一定必以無過不及之差者爲凖則焉何也儀大則分劃詳悉而分秒畢清儀小則分劃簡略而度分踈漏夫毫厘之差謬以千里創儀用以測天是鳥容草率而爲之然定儀之大小以徑線爲凖前代諸儀徑線極大不踰五尺二寸新儀之徑卽小皆六尺有餘大則一丈二尺抑思從來厯家創制儀器務爲廣大者無非欲每度寬濶其地得以細劃分秒而巳然卒未有得法而曲盡其善者也蓋儀器之貴乎大非爲其形體之鉅有足觀也亦在乎每度加廣使分秒有餘地之可容耳今新儀則每度加廣纎悉畢具是何也新儀另用負圈表因可以得負圈角故有餘地可容而分劃得全也在舊儀止容其半巳耳然則新儀之小者全徑六尺卽可當一丈二尺見十三圖甲乙象限儀其全徑甲乙丁一丈二尺若用其全徑甲乙丁以爲負
  hash: sha256:c258073fc26dcae36099ce07ef94b742192822554ad435497af78417886f2cd6
