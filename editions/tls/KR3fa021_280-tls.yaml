body:
  text: 及則照上法應用比例以推之第五題以正南北東西度求其里數正東西在赤道下與正南北度皆大圈之度其每一度當二百五十里若在赤道外而與赤道平行則以大小圈度相應表推其里數其大小圈皆依三百六十平行爲度但各圈之度不等必隨其圈之大小爲則又小圈距中大圈愈遠得度愈狹故必以南北緯筭表乃可也于初行載諸緯度次二行載諸緯小圈所應一度之分秒因而緯圈分秒漸小其所量小度亦更小以至近極之一小度得對大圈度之一分耳
