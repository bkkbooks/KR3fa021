body:
  text: 垂線球儀垂線球何眆乎葢近今數十年以来遠西之厯學名家特創新意而曲盡其測騐之法者也故凢時刻之分秒纎微天行毫末之差數靡不干是而可悉焉不寕惟是舉天下運動之疾如空際之雷响諸類也亐所發之矢也銃所激之彈也皆可以測而推之也其器較諸儀爲最简而其爲用則甚便云測法三題第一題測日月之全徑見一百十五圖此題甚有係於推測厯理葢凢定二曜之大小及交食之分秒地影之廣狹與太陽太隂距地之遠近四時并每月各有不同以至日月與本天有最高最卑之處大約皆用加减表等算法而定也今以垂線球可測而定之法日安定三角形線見一百十五圖對天正南北之線測候湏以二人如甲人測候至日月體之西弧與南北三角形線及窺目相叅直次乙人放垂球而
  hash: sha256:508580aed322fb782a8911710def7430107e6032b8f6ae7132366fd8603a56ff
