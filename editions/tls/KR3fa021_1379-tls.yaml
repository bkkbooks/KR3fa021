body:
  text: 東魚星傳説星背宿南星皆在六等之外所稱㣲茫難見者用鏡窺之則魚星列次之遠皆一一見焉若天漢相傳爲白氣其實皆數之小星也從古天文家大都以可見可測之星求其形似連合而爲象因象而命之命以爲識別然名星之左右上下雖有可見之小星然共象㣲光不甚顯難以凖測其度分次以相近名星之比例可推而定焉今照法另列黃赤二道經緯表而屬之以相近之星座又以其次第分別之亦可以備夫渾天儀之作法而眾星之今象具昭於斯安有不快足乎窺天者之心目哉
