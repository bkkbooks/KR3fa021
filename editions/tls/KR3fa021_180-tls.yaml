body:
  text: 之徑如一分之徑與一寸之徑則一厘之徑與一寸之徑如二十斤與二千斤同是再加倍之比例從此而推方圓等柱以其橫徑之所當分兩若干如十九圖有方柱豎立爲戊巳其縱徑僅足拉斷之斤兩卽辛繫在于巳又有方柱甲乙丙丁於地平線平行其大小于豎立之方柱戊巳相同其橫徑僅足拉斷之斤兩卽壬繋在於丙題曰辛之斤兩于壬之斤兩如戊巳柱之縱徑于甲丙柱之橫半徑葢丙丁線摃杆之類其支磯在丁其用力在丙由此論之試令本柱之橫半徑丙庚有其縱徑甲乙四分之一而辛之斤兩爲四千斤則壬之斤兩不過一千斤而原柱依其橫徑必墜斷矣又有兩長方之柱見二十圖甲乙丙丁而甲乙之厚面及丙丁之寬面兩面于地平線平行與两柱之一端各有繋于本力相稱之斤兩如戊與巳若再加之斤兩則兩柱必不能當而墜斷矣題曰甲乙柱厚面之橫
