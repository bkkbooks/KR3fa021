body:
  text: 線長週面闊也則度數易分而分秒之微亦易見然其體鉅則勢必不能輕巧而若少用其銅亦作徑長面濶之形則又必薄弱而不適於宜矣故特舉輕重學之數法并五金堅固之理以詳其用焉然諸儀應天道之度分南北兩樞又列春秋二分冬夏二至先後皆有常期黃赤二道地平天頂子午過極過至過分諸圈彼此相交於一點細微之內而各道各圈之中心又必同歸於一天體之中心而
  hash: sha256:1e690a9ed077ef55741419ac1c99b7ffaf3a52533fbacecce842bccb4df32373
