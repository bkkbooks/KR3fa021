body:
  text: 第七題擬天以下之疾行比而推天以上之疾行近今有測量名家依前定秒微諸法會騐放小銃時于三秒内其弹行一百八十二丈之遠設使此弹常飛行空中而不斷則必閱十一年零一百一十八日而其所行不能盡太陽一日所行之度也照此推算則六十秒卽一分内行三千六百四十丈之遠而六十分卽四刻内行二十一萬八千四百丈之遠若九十六刻卽一日内行伍佰二十四萬一千六百丈之遠今以丈數歸之里數凣一里旣爲二百一十六丈則前所計丈數共爲二萬四千二百六十六里一百四十丈也然地球每一度爲二百五十里筭之則天下週圍共九萬里而銃之彈一日止行二萬四千二百六十七里矣若行至九萬里之遠則必湏三百零六十八刻有餘歴學公論日地球之全徑其在于太陽天之全徑者如一舆一千一百四十二之比例今週與週如徑與徑
