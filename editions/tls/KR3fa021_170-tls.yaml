body:
  text: 之法原從三角形內平行線之比例而生葢三角形每對角之線在爲若干分從各分作線與腰線平行必分底而底之分與弦之比例適相等見十四圖甲乙丙爲勾股形甲乙爲弦弦之對角甲丙乙甲丙爲股今將弦卽甲乙線四分之又從各分至勾上引線與股平行此線必亦四分勾線甲丙而甲乙弦線若干分之比例必與甲丙勾線若干分之比例相等矣甲丙及丁乙卽方形之長線爲此一度與彼一度之界線甲丁卽丙乙卽方形之短線爲一度之所容并方形上下之底此形又平分見十四圖或六或十二小方形以長線爲界以短線爲底而每方形內作對角之線爲弦每弦十分之則六弦共六十分葢窺表之指線恒交每弦之線見十五圖又與方形之界線恒平行以相等之比例比分每一度之底線卽每一度方形之底以六十平分矣夫對角之弦平分若干分則窺表之指線平分若干然指線十分之
