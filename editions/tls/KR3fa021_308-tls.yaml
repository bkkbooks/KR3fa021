body:
  text: 也但其所爲易變者難以分別而大槩則自冷熱乾濕而來然能驗其爲然者則全頼人觸覺之官葢人之五官所司惟觸司頑鈍而不能顯証其氣細微之變其觸可所以能覺者賴一身脉絡所通之肌膚何以言之如有外熱攻伐吾身而身內之本熱與之相等則觸司必不之覺也惟外來之熱有過不及於吾身之熱而人之觸司方能辨其熱之强弱也故仁特造一器而藉視司卽五司之最靈者以補足觸司之所不及焉其器之屬有三一作法一用法一効驗之所以然所謂作法者用琉璃器如甲乙丙丁置木板架如一百九圖上毯甲與下管乙丙丁相通大小長短有一定之則木架隨管長短分三層以象天地間元氣之三域下管之小半以地水平爲凖其上大半兩邊各分十度其所畫之度分俱不均分必須與天氣寒熱加减之勢相應故其度分離地平線上下近遠若干則其大小應加减亦若干假如冬月
