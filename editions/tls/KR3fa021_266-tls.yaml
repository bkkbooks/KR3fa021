body:
  text: 省之道里相距彼省之道里有四千里則其一半卽二千里見一百圖查遠度表內第八方則高度表內第八方一百七十三里零三丈五尺卽本天象高度也若表中所查之高遠數比本表數或多或少則用兩相近數之比例而依三率法以推定之又于京師所測有空際之雲氣異象以求天下何省何地之所見法日先測定本象離地高若干見空際測氣之諸法次照前法查表卽了然矣地平上以高測遠以遠測高表
