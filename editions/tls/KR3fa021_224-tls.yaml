body:
  text: 新儀用輪相連以便運動天體紀限諸儀皆宜用輪相連法以便運動之葢天體儀之廣大重四千斤其妙用在可對乎天下各省北極之高度夫人之目雖不離於京師觀象臺之一處然究其可見者則在各省之天象與在一處無異也故特用大小輪法以便運動而對於各處北極之高度用此輪法則用四斤之力而能運四千斤之天體也若紀限儀原爲百遊之儀亦用此輪法以便對於天之正斜左右上下百遊之放向而轉動之所爲輕便者在大小輪相連一定之比例葢大輪之徑比小輪之徑天寸有若干見人十四圖則卽省轉動之力有若干如有輪架五對每一對有大小兩輪同在一軸每大論與其小輪之比例如五與一五對輪相連大橃小而同爲五倍相連之比例今推筭其力如有一孺子于此止能用一斤之力若用此輪
  hash: sha256:7becae42a16b6889e38d0e59208b279c9b7af703673e8f938dec2e46cc084a04
