body:
  text: 取其根葢根數多寡若干則乙球之徃來多寡若干第四題以埀線球之徃來求相應之時刻分秒法日以其準定分秒之日晷法如赤道大儀或以兩星相距定分秒之度數照前第一題交切南北線求某埀線球往来之摠數相應天上分秒之摠數幾何然後以三率法推定本球每一徃一來相應之分秒幾何依此法會製埀線球推定其一徃一來相應天上一秒六十次徃來正對一分所以一刻内有九百徃來四刻内共三千六百往来之數第五題以某埀線球相應之分秒求他不拘大小埀球相應之分秒纎微等法日照第三題用比例法其一徃一來相應三十微其徃來之雙行相應一秒因而上第四題所定之埀球六十次徃來之時此埀球徃來一百二十次又更加細微亦會另製小埀線球推定其一徃一來相應天上十微所以六次徃來
