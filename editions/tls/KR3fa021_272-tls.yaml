body:
  text: 道之外而但與赤道圈平行者則以大小圈度相應表而可以推其里數之遠近焉此兩所推近遠之法昜明也但正南北東西之外皆爲斜行其爲里數甚繁推步不昜或以經緯推距度及方位或以經及方向推起距與緯又或以緯與距度推經度及方向或以方向及距推經緯度凢此卽勾股法有所不能求也要依地水球之圓形用曲線之三角形法斯得其解也又或有用銅鉄木等大圓球其法最簡但遠行者率用鍼盤向線爲便而大球等器則難爲携帶也又推曲線三角形之法其理更爲難明熟于其法者該亦鮮矣故特照三角形法推筭而爲測路者立有幾度數三等之表名曰地經緯方向表乃用簡法而爲便于測路者詳見于後篇令始舉數題以明其用法第一題有某兩處地緯度及方向球其相距假如從甲
