body:
  text: 象限儀象限儀者葢用之以測高度者也亦名地平線儀然式雖不一惟取其有適于用焉斯得矣見第四圈夫象限爲立運之儀其製法直角爲心六尺爲牛徑用規器劃圈四分之一分則爲九十度每一度爲長方形每一方又分十二小方形而各小方之底以對角線之比例上下五分則一度共六十分又對角線之五分每以窺表指線之細分十分之則一度共六百分而每一分則當六秒也夫所劃之度數之字其從上起等以至下而鐫于弧之丙邊上者卽指星之在地平上若干度分也其從下起筭以至上而鐫于弧之外邊上者卽指星之離天頂昔干度分也故八于正數與一十倒數七十與二十六十與三十等向上向下正倒之數俱爲同線鎸識之弧以內象限空餘之地爲區龍以充其內而左右上下皆固巳然全儀須立軸以運之其安立軸之法
