body:
  text: 對一秒六十徃來對十秒二百六十徃來對一分若以之定自鳴鍾雖歴二三月之久不調其論牌而分秒無差待此器至中夏之時自詳言其用法第六題凣求時刻之分秒如無諸儀恭測其細微則隨時隨處而以本身之脉息可推而知也葢人當氣血平和之時其一息大率應時刻分之一秒如當測時切脉而自數其息則以其定秒推之而以球之徃來較之假如球每一徃一來爲一秒而其六十次之徃來爲一分當彼六十次徃來之時若巳之脉息亦至六十次則每一息代秒用之若有過不及之差則用比例法假如球六十次徃來之時數巳之脉息至六十八次則一次爲比例之共率因得三十四脉息相應三十秒十七脉息相應十五秒餘倣此蓋六十八舆三十四如六十舆三十又六十八舆十七如六十舆十五同一比例之理也
