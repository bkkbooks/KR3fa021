body:
  text: 分別東西南北各方之風氣或上下左右各房屋之氣燥濕何如以此器驗之無不可也夫氣之有厚薄也踈宻也輕重也加减而遙相爲焉何以明其然邪今以氣自然所在之地爲七十分之一分而設言之假如有氣於此其自然所在之地止能盈寸若用法以强之則此一寸之氣能放而盈七十寸之地又有氣於此其自然所在之地則盈七十寸若用法以强之而卽揫斂於一寸之地此諸氣厚薄輕重之力與諸測法也其强之法與器詳見木法之本論測天諸氣之法於蒙氣之差所係爲最大其差加减之於高度則其所測之合天與否可定也其測法并其差表具載日躔厯指諸書中但蒙氣差細微之處極緊不過數分秒耳今故舉他體通廣之差并其測法差表以明具理而推廣夫儀器之用法夫通廣之體有二一光明易爲透微一難透微皆由本體各
