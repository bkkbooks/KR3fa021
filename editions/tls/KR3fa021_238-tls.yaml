body:
  text: 磚等照前法懸之空中亦然假使地之本性無南北之向何能使所生之物而自然轉動向南北兩極之理乎其一地之全體相爲葆合有脉絡以聊貫于其間當考天下萬國名山及地內五金礦大石深礦其南北陡袤靣上明視每層之脉絡皆從下至上而向南北之兩極焉仁等從遠西至中夏歷九萬里而遙縱心流覽凢于瀕海陟袤之高山察其南北靣之脉絡大槩皆向南北兩極其中則另有脉絡與本地所交地平線之斜角正合本地北極在地平上之斜角五金石礦等地內深洞之脉絡亦然凢此脉絡內多有吸鉄石之氣生夫吸鉄石之氣者無他卽向南北兩極之氣也夫吸鉄石原爲地內純土之類其本性之氣與地之本性之氣無異故耳之稽夫講五金諸書皆以鉄性爲純土之性卽五金中鉄之體爲最近純土之體如鉄之有鋪也原其所從生則亦類乎土之渣滓此可叺
