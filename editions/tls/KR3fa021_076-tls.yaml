body:
  text: 靣劃有子正初刻其内規靣劃有午正初刻其餘时刻皆從之而定焉且上則用緯圈下則用表景隨便可以測定時刻也若夫赤道圈之外規靣分三百六十經度從規内靣卯正相對之線起筭自西而東隨諸天行每一度依上法作長方形每一方又另分六小方形每一分以對角線之比例又分十小分卽一度共六十分今游表之指線亦分十空之界線而每一分空内開爲四格小空每一格當十五秒則四格共六十秒也其赤道之下側靣分象限而四之而子午卯酉爲各象限之初度至于緯圈四靣列度分秒之法舆赤道經圈無異葢各靣四分象限而内舆外規靣之象限各度数則從赤道線起筭向南北雨極而止焉具上下側靣之度數則從兩極起筭向赤道中線而止焉又經緯圈各有表者四舆黄道儀正同而全儀則下有一龍以爲座向正南而負之其前後兩爪安于兩
