body:
  text: 測水法水之周遠于地同爲圓形巳詳於別集矣道見全地圓今略舉測水平之器與其法而言之夫水平人人之所知也然水平之理及測法之極玖則取水平者皆有所不知焉如五六丈之遠以取平難見其謬若至數十丈或數里之遠并其測法俱竆矣且測法之凖與不凖所係爲甚鉅葢國家之大工如桃漘河渠爲與利防患記者不越乎此夫水之通塞分於毫末之高庳其説別詳於引水法論葢水平之與地平有異所謂地平者乃地上一線與過地中心之垂線爲直角也其線兩端距地中心近遠不同而輿地平無礙見一百三圖甲丙戊丁爲地水球甲乙線之兩端甲與乙去地中心戊近遠不同但其本線與垂線甲戊作直角實爲地平線也所謂地平線者必其兩端去地中心近遠無二如上圖內辛壬線是也今姑舉數題以明其測法
  hash: sha256:811c04a48832b17820bc37b51700828f48c4048144df76bed85fd9a3e68ca8f1
