body:
  text: 依黃道經緯儀在黃道線正中在冬至後四十五度零六分在春分前四十四度五十四分依赤道經緯儀在冬至後四十七度三十四分在春分前四十二度二十六分在赤道南十六度二十一分依天體儀于立春度分所立直表則表對太陽而全無影依地平所立八尺零五寸表則太陽之影長一丈三尺七寸四分五厘六儀並用而叅互之而立春一節皆合于預推定各儀之度分如此則厯凢所推之節氣其合于天行無疑矣然非籍有合法之儀又何從測而得之夫所謂儀之合法者抑豈憑臆而强就之也哉要皆法其本然之象耳葢混天之體原有赤道有黃道而居乎渾天之半者日地平經緯分焉故因其本然之象崇而効之制有三規一日黃道經緯儀一日赤道經緯儀一日地平經緯儀地平儀又分爲二一日經儀一日線儀卽象限儀便用故也凢日月五是二十八宿之行以及所躔之度分摁于此三
