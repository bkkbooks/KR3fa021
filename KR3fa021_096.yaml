body:
  text: 制紀限儀甚重大側運之則必下垂而螺柱恐難以定固于半周弧外規加齒而立軸旁則加小軸其徑約二寸其圓靣稜齒與牛周齒相入又小輸同軸而另加全輸其全徑與小輸之徑如五與一與半周之徑如一與二蓋依舉重學之理轉運之而輕五倍也用此法則全儀不勞力而可側運矣定之則于立軸下端深入臺上端之圓孔因儀左右旋轉而窺測之目可無所不至矣臺約高四大其座約寬三尺從下至上有遊龍蜿蜒以繞之而紀限曦之制于斯全焉
  hash: sha256:6e52028b88219ad193c5ee6151dd377386a0d8df2e942f02650f30044ed04f52
