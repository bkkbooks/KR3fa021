body:
  text: 驗氣說氣者四元行之一蓋天之於地有上中下二上域近火近火常熱下域近水土木土常為太陽所射故氣暖也中域上遠於天下遠於地故寒也然則各域之界由何而分今姑以極峻之山畫三界以喻之山之巔為上域風雨之所不至者也故其氣極清而人與物不可居焉其下為中域霜雪必爾凝結也又其下則為下域而其寒暖之分又又輕重厚薄之不同焉若南北二極之下因遠太陽則上下之暖處薄中之寒處厚若赤道之下因近太陽則上下之暖處厚中之寒處薄以是知氣域之不齊也四元行之中惟氣行為最易變以氣在天地之間上依星辰異照下依土水異情其星辰各有德性而資育萬物者也然各曜又因相會相對之勢而變異其情則其效遂因之面亦異且氣甚微甚順易受諸天之變諸效之桑
  hash: sha256:4321b694560a47a837199f51bb5021e1e1b8a67c2e0626e206bb1223e2c2114a
