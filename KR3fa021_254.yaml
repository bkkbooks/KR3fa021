body:
  text: 黃赤二儀安定之法黃赤二儀安定之法畧同以東西南北地平三圈並北極之高度爲定先豎子午圈而左右以六尺之垂線凖之使其兩靣正合過天頂圈卽以直角交地平也以後凢說垂線者必須細微銅絲用斤半重之垂球四方之筒以避風葢絲線等絲左右轉動難以定凖見九十四圖次照前法依南北之線安定之次於本圈之頂極安垂線至其底極安垂球用座架四角之螺旋轉高下本圈使其北極正對天上之北極卽使垂線正合于本圈之底極度凢垂線于底極左右所切度分應爲本度分之半耳因垂線之角負圈之角故也其理詳見前章次用赤道緯圈若用黃道儀則以過極之圈爲赤道緯圈而午前午後累測恒星赤道之緯度葢使午前後兩測之緯度分相同無差則南北東西柱圈正合于天而無差明矣
