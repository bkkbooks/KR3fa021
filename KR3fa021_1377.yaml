body:
  text: 從九品頂帶天文生對本豚從九品頂帶天文生蕭蠶性治理厯法極西南懷仁纂著博士魏起風同受從九品頂帶天文生馮蔥從九品頂帶天文生戈寧鎮增定附各曜之小星黃赤經緯度表及天謨表增定附各曜之小星黃赤經緯度表仰觀普天之星象所不能罔不能測象限於目力而不能別識其繁也徃昔當法製廣大之窺筒內安四玻璃鏡而兩日並周窺天則一目而用雙玻璃遠鏡所視極其分明故以之觀列宿天之眾星校平時不當多數十倍而且界限明也卽如昂宿傳云七星而實則三十六星鬼窜中積尸氣相傳爲白氣如雲耳用鏡窺之則又三十五星歴歴可數如牛密中南星尾宿
