body:
  text: 星諸天象正方向之所究之四靣之方向大謬也仁於康熙十年以正法考之其東西墻五丈內離正東西二丈有餘古之管窺象緯者何誤一至此也定正向之原所巳謬如此將何施而可哉夫差之毫釐謬以千里今四五丈內有二三尺之差則四五里內即有數丈之差如九十一圖甲乙為舊臺東西墻巳丁為正東西線兩線引長至四五里遠愈遠愈多相離五里既有數丈之差則引長而至於天上元地平圈線豈不有數千里之差乎凡定方向必以天上元地平線為主而羅經之中心當元地平之中心今羅經之所定既差數千里如此豈可用以定安儀之方向乎
  hash: sha256:00062a2ac20549f9c1ea4375550ac5fb69bdbeccbb4cf732e843f4b9a65c6431
