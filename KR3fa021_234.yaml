body:
  text: 星諸天象正方向之所究之四靣之方向大謬也仁於康熙十年以正法考之其東西墙五丈內離正東西二丈有餘古之管窺象緯者何悞一至此也定正向之原所巳謬如此將何施而可哉夫差之毫厘謬以千里今四五丈內有二三尺之差則四五里內卽有數丈之差如九十一圖甲乙爲舊臺東西墙巳丁爲正東西線兩線引長至四五里遠愈遠愈多相離五里旣有數丈之差則引長而至於天上元地平圈線豈不有數千里之差乎凢定方向必以天上元地平線爲主而羅經之中心當元地平之中心今羅經之所定旣差數千里如此豈可用以定安儀之方向乎
  hash: sha256:b6d80a3fe37c7987f1ecc97fd39c9759f28dab7148476bf72e100e058657c23f
