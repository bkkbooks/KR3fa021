body:
  text: 左右上下皆可推移而安對之雖一分秒之細微亦不淆也天體別有輪法以消息之縱有五千斤之重而一人用四斤之力即可旋轉如意以測夫天下各省北極之高度總之用法無不可通故即此一儀之地平亦即可以為天下各省之地平而用之以測驗渾天之象焉
