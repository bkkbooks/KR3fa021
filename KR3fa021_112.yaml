body:
  text: 反混亂而失據矣如星球上凡有密點皆如天漢積尸氣傳說牛宿第四第八星等皆密和微小之星止用遠鏡窺測可分別之舊法疑其非星因稱為氣耳又子午圈外規靣上安有時圈其全徑二尺以北極為心其上側靣分二十四小時每時四刻共九十六刻每刻十五分每一分以對角線之比例又以六分之則每一分當十秒也其指時刻之表以螺柱定于北極樞因能隨天體而轉又能隨本螺柱左右自轉以便對于各時刻分前代如元明以來所造星球止可于一地北極之高度用之今此一天體儀可通用以測普天之下之天象也蓋子午圈下制有鋼象限弧其寬二寸五分厚一寸釘于子午圈之西側靣其外規靣有齒規齒底之下另有長齒之小輪下齒與上齒相入小輪之同軸另有大輪其外規靣之齒與柄軸上小輪之齒相入而大論與柄軸小輪之比例為四分之一
