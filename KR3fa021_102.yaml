body:
  text: 至兩圈內規靣平合而左右上下環抱乎儀周圍則須留五分之鏈為便于安高弧而進退游表隋用規器於地平上靣多作平行圈線以別度與字之間處必于劃度處展之于劃宇處縮之便以長方對角之線細分官度地平之上靣共分內外中三層內層劃有地平經度分四象限而各為九十度其經度之上下則劃有度數字平距圈線內外界之上所刻字以正南正北各為初度以正東正西各為九十度界下所刻字反是以為測驗時便干用故耳內層則以周渠為限界渠之深寬相等即五分內堪容高弧之足即地平經度表也自周渠以外則地平中層矣其上下平距圈線者即線界京師地平日晷時刻也每一時分八刻而每一刻則十五分午正初刻即自子午圈正靣南邊交地平而起子正初刻相對于兩圈北邊相交處日晷源表者即天體過南北之軸也
  hash: sha256:f1edf1b468f3ec97b9072fdebf1884140f609a440a0359052347d82fdac9e777
