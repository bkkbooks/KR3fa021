body:
  text: 之旨是年秋八月復蒙部議新造儀器併安設臺基俱照南懷仁所指式樣奉有依議之旨仁自受命以來夙夜祇懼畢智竭能務求精乎儀象之有利於用而以密測天行貽為典則此愚分之所矢素心自盡者也難然儀象之作蓋以定永遠之明徵而使後世有以私智自用者無所騁其臆説則其事可易言也哉是何也夫諸儀有作之法有安之法有用之法
