body:
  text: 在本球內之天氣加厚而其從前所占八寸之地自收斂而歸於二寸之地若五日內如皆八分之泠則球內之氣第一日加厚一寸第二日不及一寸第三日不過五分第四五日加至三分而不動矣若六日內八分之冷氣與此相同而其加厚之寸分每日不同蓋冷熱之驗有所必然者故候氣之具自與之相應而以冷熱之度大小不平分相對之至於用之法頗多總歸于一即所謂辨冷熱之分是也冷熱者天地萬變之所起造化之功所由成也今姑舉其用之有四以驗之一測天氣一測地氣一測人物氣一測月星等之氣先以測天氣言之天之氣畫夜無間而無不變易在卯酉子午時其氣之升降不同器內之水亦應之如卯時太陽上地平天氣加熱而升午時氣更熱而更升氣升降之理有本論在乙庚管之水亦然酉時太陽下地平而天氣降子時更降在管之水隨之而歸於地平如明
