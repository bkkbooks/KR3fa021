body:
  text: 但本軸在儀體之中不見故儀靣上過南北兩極不拘何圈俱可以代表也地平靣上其外層圈線者卽分定三十二方之線也此外圈亦分四象限各有八方之線亦名風線葢地平周圍從三十二方風之有名者而起几定方向及細心觀侯天象者必應分別之夫地平及子午兩圈因在天體靣之外係外圈此兩圈全備如此則儀面上之註圈可定以爲內圈前南北兩極當其中而劃赤道圈以四象限分之令各象界線與子午卯酉四正正對次則另用規器而以各象限初度爲心以未度爲界劃四半圈正對各兩牛相遇于南北兩極而成兩全圈其一定春秋二分名爲過極分圈一定冬夏二至名爲過極至圈二分在黃赤二道相交之界二至爲黃道緯南緯北至遠二界卽二十三度三十一分三十秒也故過樞至圈上自赤道緯北之二十三度三十一分三十秒爲界而以一象限未
