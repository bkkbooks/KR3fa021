body:
  text: 法則能起二百九十八萬五千九百八十四斤之重曾照此法造小輪架以爲引重其長不及二尺其濶深不及一尺內有三等輪與三軸彼此相通相撥獨用一絲繩以轉動之而拉重物勝于數十人之力焉其所以然之故則詳見所論重學諸題
