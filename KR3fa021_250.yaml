body:
  text: 星對南北之線起數垂球之分秒至某星西方之高度與東方之高度相同葢午前後分秒若彼此相同則向所定南北之線正矣若午前分秒比午後多則其所差刻數之分秒應變赤道之分秒而取其半以攺南北之線葢此一半之分秒若干則南北之線應移于東分秒若干若干後分秒多則南北之線照上法應移於西以上諸法攺移南北線或東或西若干分秒詳見九十三圖庚干戊子爲應攺南北之線卽子午圈也子午爲地平戊爲天頂甲丁庚爲赤道癸爲赤極戊辛爲高弧壬爲某星午前所測之高度巳爲其午後之高度今依三角形法應推兩角卽戊癸壬角並戊癸巳角戊壬癸形有壬癸弧卽星赤道緯之餘弧有壬戊癸角卽星地平經度角之餘角有戊癸弧卽北極高度之餘弧故依法推知戊癸壬角又戊巳癸形有某星赤道緯度之餘弧有巳戊癸角如前法並戊巳弧
