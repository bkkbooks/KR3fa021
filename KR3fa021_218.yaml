body:
  text: 之數若干平分而以其數之半若干於近架內安定小輪若干而其繩之一端則必繫于遠架若依不平分之比例安定倍力之滑車于倍之數減一而餘數之半即為近架小輪之數而其繩之一端則必繫於近架也見七十二圖如上滑車近遠兩架通用一繩而其一端止繫于一處其倍力之比例皆如此若其小輪則每一輪各用別繩而各繩之一端又各有安定之處則倍力之比例為更大焉見七十三圖假如重物在庚滑車各繩定于甲乙丙丁人力在戊則加十六倍蓋依滑車之力也若人力在巳則與重物相等在辛則加二倍在壬則加辛之力二倍巳之力四倍在癸則又加壬之力二倍即巳之力八倍蓋遞加新輪則遞加倍力有如此此滑車之輪法假若倒用而以重物之所在為人力之所在則重物之斤兩加倍若干而起之速亦加倍若干見七十四圖假如用為水筒乙為人力按此輪法
