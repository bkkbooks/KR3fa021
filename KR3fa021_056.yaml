body:
  text: 右監副劉蘊德筆受治理厯法極西南懷仁著春官正孫有本詳受秋官正徐瑚新制六儀夫儀者厯法合天與不合天之明徵也故測騐天行儀愈多愈精而測騐乃愈宻葢凡天上一星所歷時刻難躔有一定之度分然以儀相對而測之則必與天上東西南北之各道有上下左右遠近之分焉故測騐其星所躔之度分必依各道之經緯度分而推測之始無所戾是則欲爲宻各天行之厯法而非有備具宻合天行各道之儀厥道無由也如康熙巳酉八年正月初三日是日立春內院大學士圖海李霨諸鉅公名卿奉旨同視测騐立春一節於本日午正仁測得太陽依象限儀在地平上三十三度四十二分依紀限大儀離天頂正南五十六度十八分
  hash: sha256:bb03dc555e9e5e3848f7eb6728895156e30f18c0b8525427ccfd689d0ee668a0
