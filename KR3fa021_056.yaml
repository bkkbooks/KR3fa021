body:
  text: 右監副劉蘊德筆受治理厯法極西南懷仁著春官正孫有本詳受秋官正徐瑚新制六儀夫儀者厯法合天與不合天之明徵也故測驗天行儀愈多愈精而測驗乃愈密蓋凡天上一星所歷時刻難躔有一定之度分然以儀相對而測之則必與天上東西南北之各道有上下左右遠近之分焉故測驗其星所躔之度分必依各道之經緯度分而推測之始無所戾是則欲為密各天行之厯法而非有備具密合天行各道之儀厥道無由也如康熙巳酉八年正月初三日是日立春內院大學士圖海李霨諸巨公名卿奉旨同視測驗立春一節於本日午正仁測得太陽依象限儀在地平上三十三度四十二分依紀限大儀離天頂正南五十六度十八分
  hash: sha256:42c4970f5b1859570c4ecb84b0f1a23f37ddfa78eaef2d051fb1af3d76c24245
