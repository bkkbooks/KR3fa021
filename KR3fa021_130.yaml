body:
  text: 黃道儀之用法欲求其星之黃道經緯度須一人于黃道圈上查先所得其星之黃道經緯度分見赤道儀用法其上加遊表而過南北軸中柱表對星定儀又一人用遊表于緯圈上過柱表對所測之星遊移取直則緯圈上遊表之指線定某星之緯度又定儀查黃道圈兩表相距之度分即某星之經度差若本星在黃道密近難以軸中心表對之則用負圈角表而測其緯度其法與測赤道緯法同若夫天體儀之用法詳見新法厯書渾天儀説中
  hash: sha256:b1bfd0b8c26f403b118bd2a417599d902211aee60bb7561983323ba14d47621d
