body:
  text: 新儀分法之細微儀之務爲覃精者曷在乎在於度分之細微也夫古者之造儀類必恢宏其制者豈非欲得以分度之細微哉然分度之細微非僅在一度之廣大而巳也要在乎一度之分法焉如先代元明之儀有度之數無度之分然卽有度之分縱極其細微不過十分巳耳若夫新儀則有異葢每一度爲六十分而每一分又分爲四細分則一度爲二百四十分而每一細分當十五秒較之舊儀所爲極細者細於二十四倍矣又有每度三百六十細分每一分當十秒如用負圈表加細一倍而每度可分七百二十分則比舊儀細與七十二倍矣且每度可分六百細分如象限儀紀限儀每一分當六秒則比舊儀細於六十倍矣若象限紀限等儀用負圈之角則每二度當筭一度而此一度細分共一千二百分每一分當三秒則細比舊儀百二十倍矣夫此細分度
