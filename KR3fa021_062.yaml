body:
  text: 表無測黃道經緯之正法其天頂立圈太近于地平其窺表不能測在地平相近之星夫天球而既無星距無黃道等圈無宮次之分其地平無度數則器總歸于無用矣考古圭表之法其圭原偏而向地平其表更偏而離天頂又離正南北之線故仁以勾股之法修正之庶幾可免夫乖舛也巳
