body:
  text: 指南針之偏于東西而不合于南北之正向夫指南針而謂可以定南北之真向者鮮矣以其或偏東或偏西也遠西從數百年以來知天文地理博學之名士閲歷偏于萬國跡之所至必究心焉是以知指南針之偏而記録各地之偏若干度分所以定地之經度而因以推知海洋之路仁等西儒末學自遠西接踵而至中華蓋由舫海曲折以歷乎東西南北之境約九萬里而遙每于日出入時依本法測驗指南針之偏而較古人之所記録者遂照大地之經緯度隨地計指南針所偏之度分今試舉其所以然者言之夫吸鐵石一交切于鐵針則必將其本性之轉動而向于南北之力以傳之如火所煉之鐵等物必傳其本性之熱焉又凡鐵針及吸鐵石彼此必互相向故即使有針向正南正北者而或左右或上下有他鐵以感之則針必離南北而
  hash: sha256:8aa50188f0c98926782413cb7cfc2fe1b9abbbdfeba7ee99cc961f721f992b42
