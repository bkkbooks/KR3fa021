body:
  text: 偏東西向焉今夫吸鉄之經絡自向南北二極而行但未免少偏而恰合正南正北者少故各地所對之鉄針未免隨之而偏矣試觀水盤內照南北之各線按定大小各吸鉄石而於水靣各以鉄針對之則明見多針或偏西之與偏東若干若照盤底內其所對之吸鉄石篇東西又若干矣今繪大海之圖以明之吸鉄之筋脉在水靣下者比在水靣上者其氣更全以其爲諸星照臨之所不到無有傷之故也東西南北爲地球見九十二圖甲乙丙丁繞地靣之大海從南至北抱大地之曲線者卽大地向南北吸鉄之筋脉也夫行海者所爲定南北之針多偏東偏西者因其海底吸鉄之經脉篇東西若干也陸地之針亦然審乎此則指南針多偏之故並其所以不可定南北之正向明矣
