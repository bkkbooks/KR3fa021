body:
  text: 蠟銅縱橫兩行梠遇之方內書在九倍又二十一分之九分解日若蠟球有一斤重則同徑之銅球有九斤重又一斤二十一分之九分欲觀水與水銀之輕重差則在卷內之十三分又七分之四分可考也又如水之重約一斤則水銀相等有十三斤又一斤七分之四若儀器銅圈應厚一寸寬二寸其徑該六尺長求其銅之斤兩法曰先作有一尺徑蠟圈寬厚與銅大圈相等因而照前表法求等大之銅圈次從一尺之徑圈因而推六尺之徑圈看新法測量全儀第五卷然後看前表凡銅鑄儀其座架并方圓各形之柱表梁等先無不用蠟而作大小各式樣因可推其應作銅鐵元柱表梁等各輕重之斤兩矣凡此係前表之第一用法今照第二用法有銅有蠟兩球輕重相等求其大小之差銅球必小當一而銅蠟縱橫兩行相遇之方內書在九又二十一分之九分解曰銅球之大與蠟球之大如一與九又
  hash: sha256:83786abddc2b3801d02620c44293b717e69ad61f3a09db3d360ea3290e9a1896
