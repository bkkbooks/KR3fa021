body:
  text: 用法手握垂球不急不緩任意離之于頂線見六十四圖假如甲自甲至乙乃釋手方之則球之中心恆當天頂以圈線之中自上下往來而離頂線其左右則作圈線弧如甲乙丙而其圈之中心在于軸之中心如戊此圈弧短小如將盡時即照前法提球而放之令往來一日相繼以定時刻分秒之凖則焉但初放時其圈弧不可太過大略在四十五度之內又從而提之不可等球往來全盡如將盡則又提球而放之各有定規學者習而熟之無所施而不可也今約舉數題以解之第一題凡埀球以來以往之單行其相應之時刻分秒皆相等又凡埀球往來之雙行其相應之時刻分秒亦相等所謂單行者即埀球之一往或以來也假若從甲至乙為一往之單行從乙至甲為一來之單行從甲至乙并從乙回至甲即往來之雙行也解日若用
  hash: sha256:cab32efd3b9f4d92b7f802aafa4c2128bf27599526cdcd212357e5eb99291c5f
