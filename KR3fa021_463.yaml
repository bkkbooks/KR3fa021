body:
  text: 太湯及諸曜出入地平廣度表太陽出入地平廣度表者所以定周歲太陽出入之力向晝夜之長短每日不同之數也皆以極之出地並赤道緯度為主故天下各省日出入之廣度晝夜之長短俱不同也如求其日某省太陽出入之廣度幾何則查本表內某省極出地之高度並某日之緯度縱橫相過之方即得其所求矣求諸曜出入地平廣度表與太陽同
