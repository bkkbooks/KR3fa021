body:
  text: 考驗之無慿也乃復法象而製為器以其次年之所測較勘於前年之所驗者推而廣之接續成書精確不刋以貽來世使後之學者師其意而不泥其迹則凡諸厯諸數靡不可因之而有所考究焉且厯者歷也言其歷久而常新也夫歷世愈遠則其理愈精而其為法乃愈密然非器之有合乎法又鳥從闡微抉奧使法極其密而理極其精乎且夫天距地之遠者幾何日月五星各列本天而各天有
  hash: sha256:84eb8d92c82862ce324ca507e833bf336c1c29afe2b702a4ad5039a13b605211
