body:
  text: 考驗之無慿也乃復法象而製為器以其次年之所測較勘於前年之所驗者推而廣之接續成書精確不刋以貽來世使後之學者師其意而不泥其跡則凡諸厯諸數靡不可因之而有所考究焉且厯者歷也言其歷久而常新也夫歷世愈遠則其理愈精而其為法乃愈密然非器之有合乎法又鳥從闡微抉奧使法極其密而理極其精乎且夫天距地之遠者幾何日月五星各列本天而各天有
  hash: sha256:43dbe9c0b041a0f9c260f1e8d6cd5d5daddeb334d2a38a868e3e3d524a40a8d7
