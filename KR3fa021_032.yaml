body:
  text: 今之諸儀是器也而理與數與象或寓焉故諸儀有作之法有用之法有安定與夫一切運動堅固之法凡此非見諸發揮精粗具舉則是惟臣知之而人不知豈所以公諸天下而垂永久之意乎以故融貫舊聞抒以心得覃精研慮縷析條分而且推類旁通繪圖比切有說有表次為一十六卷名曰新製靈臺儀象志要使肄業之官生服習心喻不致扞格而難操傳之後世亦得憑是而有所考究焉此臣之所為仰答皇上委畀以典厯之命而盡愚分之所當然也洪惟我皇上聰明天縱聖學日新則此象數之言實有切于治厯明時之學以之敷陳黼座而備乙夜之觀其於
  hash: sha256:9365ab380d4403b1e8fd1ad1ed14cd48a9bf9a2ec53519a714089142e8e978ec
