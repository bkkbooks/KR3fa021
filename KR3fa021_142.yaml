body:
  text: 一測于某時黃赤二道之某度分入度分一測黃道九十度限係何宮度分天體儀之用天體儀者諸儀之所統宗者也其理詳見於新法渾天儀説中今止列其條目如後一末北極出地度一求太陽躔度一求恒星黃道經緯度一求太陽赤經緯一求恒星赤經緯一求黃道每度赤道緯一求黃道各弧出沒之距時一求兩星出沒之距时一求星出沒與在地平上之時一求黃道升降度一求黃道見與不見之弧一求星當見之時
