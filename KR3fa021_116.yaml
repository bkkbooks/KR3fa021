body:
  text: 窺表儀之所為合天者端在于分之法與窺之法也蓋分之務極于細又務極于均窺之務極于密又務極于確此二者造儀之大要也分法詳見後篇今就諸儀通用之窺法而言之蓋窺法所用之具則不離乎窺衡與窺表而巳夫窺衡即右之窺管窺簫之類是也有指線有度指見十二圈指線者何衡中指儀之經線也度指者何衡之杪而即指儀之弧上之線以指定度分者也蓋儀之中心當天之中心儀之經線當天之經線凡測天之法必從天之中心以天之經線為窺目之視線指定夫在天之度分也窺表者窺衡兩端直立之表也有上有下下表於窺目近而上表則於窺目遠也凡過儀之中心圓柱或兩極相連之圓軸或儀之經線皆可代上表下表有方形有圓形有恆定表有轉表有游表凡兩表须相等相向而其上下左右之窺線须與儀之指
