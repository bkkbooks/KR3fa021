body:
  text: 夫空際彩色之異從雲氣之厚薄而生前論巳悉之矣今更借玻璃之五彩以明之如三稜角玻璃從每角起至對角靣止則玻璃之體漸次加厚見一百十二圖甲乙戊巳為三稜角玻璃分三等厚薄之界線因而所見彩色約分三等焉如香圓色紅花色天青色是也其餘諸色從此三色交映而生蓋太陽之光斜透玻璃必多混雜其玻璃厚薄若干則日光混雜亦若干而其所現彩色濃淡即若干矣如玻璃上層甲乙較他層更薄日光易透故其所映之光稍混而彩色與原光和近其所現之色淺淡如香圓色是也玻璃下層戊巳較他層厚甚日光難透故其所映之光朦混而彩色與原光相遠其所現之色深濃如天青色是也玻璃中層在厚薄之間故人目透視之日光其彩色乃在青黃之中如紅花色是也然則日光之濃淡昏明無不從玻璃之厚薄而生也審此則玻璃所現之彩色與虹霓
