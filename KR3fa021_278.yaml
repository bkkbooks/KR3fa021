body:
  text: 以推其緯度假如甲丁兩處經差為七度二十分而從甲處依第二方向徂東北至丁處求丁處緯度幾何法曰查第二表右直行內七度而第二向下相應得十六度三十九分又本行內查第八度而第二向下相應有十八度五十七分以大减小得差一百三十九分與四十分相乘而所得數與六十分歸之即得一度三十二分加于甲處緯度即十六度三十九分共得十八度十一分為丁處緯度也第四題有兩處緯差及方向求其經差假如從緯之五十度依針盤第二向徂東南至緯之三十四度求兩緯度之地經度差幾何法曰第二向下查緯之三十四度第一直行內相應得經之十五度又本向下查緯之五十度而相應得經之二十四度以大减小得九度為兩緯度之經差若本向下所差之緯度有過與不
