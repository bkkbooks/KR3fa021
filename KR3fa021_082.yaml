body:
  text: 有平方尺表如窺衡然自橫表之兩端各出一線而過天頂與立軸之長徑左右各作三角形三線互相參直共在過天頂圈之平靣上而與窺衡之指線凖合夫立軸左右旋轉則人窺測之目及某星并過天頂三角形線參直而窺衡之指線指定地平之經度矣此儀之細微不止于地平之分法而更在乎地平中心所出直軸之徑線凖合于天頂之垂線毫末不難也故依勾股法之理先自地平之中心劃地平大圈然後以立軸中天頂線為股以大圈半徑為勾而自本圈相對之四處斜直一堅硬界方至天頂線之一點以為勾股之弦若四處之弦長皆一而纎毫不差則直軸之中線必合于天頂之垂線矣其說詳載幾何原本第一卷第四題又儀之輕巧在于四方螺旋之用法詳于儀器安法又在于地平方尺之橫表蓋此橫表须厚一寸而寬一寸五分以免致于垂下而不合乎儀之本徑也
  hash: sha256:b36554cec26c1a110d469f5a8c7b9ab7d3bed8f48bbd0837ecf16a67cd06e507
