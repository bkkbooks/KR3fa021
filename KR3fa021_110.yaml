body:
  text: 界為心相去三宮為界用規器作過黃極各大圈凡天上諸星諸點在一宮兩界線中者即命其在某宮之度分也從來歷家造星球星圈星表必以測驗為據而定其經緯測驗愈久愈密古人但以目之所見略定星象以東西南北總別之後代歸之于黃赤兩道之宮次又後歸之于宮度今世猶為加密而定其經緯度分秒矣蓋歷年愈久則測驗愈合也夫先代如元明之儀頗為粗略用以測天往往不能定諸星經緯之細微今新制之方儀則渾天大小諸星俱可考測而定此近古所未有也仁照現在之星表星圈新儀靣上普列一天之星過此以往以六儀互用而考測之則于數年考測之後而更加精詳矣夫星球最為合天象之儀星宿列其上與列在天者無異則一舉目而讖之矣若舊法之圖星球所布列星天上所無者或不分別其大小之等第則儀殊不象于天而觀天者之目
