body:
  text: 界爲心相去三宮爲界用規噐作過黃極各大圈凢天上諸星諸點在一宮兩界線中者卽命其在某宮之度分也從來歷家造星球星圈星表必以測騐爲據而定其經緯測騐愈久愈宻古人但以目之所見畧定星象以東西南北摠別之後代歸之于黃赤兩道之宮次又後歸之于宮度今世猶爲加宻而定其經緯度分秒矣葢歷年愈久則測騐愈合也夫先代如元明之儀頗爲粗畧用以測天往往不能定諸星經緯之細微今新制之方儀則渾天大小諸星俱可攷測而定此近古所未有也仁照現在之星表星圈新儀靣上普列一天之星過此以往以六儀互用而攷測之則于數年攷測之後而更加精詳矣夫星球最爲合天象之儀星宿列其上與列在天者無異則一舉目而讖之矣若舊法之圖星球所布列星天上所無者或不分別其大小之等第則儀殊不象于天而觀天者之目
