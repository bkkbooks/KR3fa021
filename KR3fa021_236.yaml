body:
  text: 大地之方向并方向之所以然凡定方向必以地球之方向為凖地球之方向定則凡方向遂無不可定矣夫地虛懸於天之中備靜專之德本體凝固而為萬有方向之根底一日天兩極之向一日天中心之向所謂天兩極之向者即地球南北之極正對天上南北之極永遠而不離者也并無動之之理即使地有偶然之變因動而離于極則地亦必即自具轉動之能以復歸於本極與元所向天上南北之兩極焉夫地球兩極正對天上兩極振古如斯未之或變也故天下萬國從古各有所測本地北極之高度與今日所測者無異可知矣所謂地自能轉動以歸向天上兩極者舉三端之理以推之其一地所生之鐵及土所成之舊磚等其性稟受於地故具能自轉動向南北兩極之力如燒紅之鐵以銅絲懸之空中既復原冷則兩端自傳而向南北兩極再如舊墻內生鐵鏽之
  hash: sha256:2957c7ac76dce2fd7a980f84d0a3455d4b95a8f5ce54e6cec45d0ad519909d86
