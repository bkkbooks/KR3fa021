body:
  text: 必有縱徑有橫徑其縱徑之力與橫徑不同儀之中有方柱圓柱有長方各梁柱有長遠表其中有豎立者有與地平線平行者有橫斜用者縱徑橫徑各有說焉今先論縱徑之力以定橫徑所承之力西士嘉理勒之法日觀于金銀銅鐵等垂線繫起若干斤重漸次加分兩至本線不能當而斷如金及銀之垂線其橫徑一厘試加斤兩至二十三斤而斷又同徑之銅鐵線試加斤兩至十八斤而斷因此法而推論曰有金銀立柱于此其橫徑有六厘必得八百二十七斤之分兩能當之銅鐵柱必得六百四十七斤之分兩能當之有同徑之鳥木等材料之立柱約得一百一十八斤之分兩能當之如十八圖蓋凡兩柱大小之比例為其兩橫徑再加之比例而其堅固之比例必與之相同譬如有金線于此其橫徑為一厘若能當二十斤則一分徑之金線必能當二十斤矣蓋一厘之徑與一分
