body:
  text: 十格六方六十格因以六對角線十分之比例每一度分六十分矣諸圈內外見靣之度分皆如此今游表之指線平分十分輿對角線之分各有相當之比例每一分又四細分而每一細分當度分之十五秋因而一分分六十秋一度共有二百四十細分云過極至圈內外規靣從赤道線起算向南北之雨極則赤道線為初度所從起而雨極各為九十度其兩側靣之度數則以雨極各為初度所從起而赤道線為九十度焉緯圈之度數亦然內外規靣以黃道中線為處度所從起而南北兩黃極則為九十度焉其兩側靣之度數則輿過至圈兩側靣所起之度數同也
  hash: sha256:4fb9dc3ce3c7452c275831f26ce2f03e1558b2fd7a4aaa49d48ecd4f4e7d10b6
