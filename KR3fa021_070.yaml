body:
  text: 十格六方六十格因以六對角線十分之比例每一度分六十分矣諸圈内外見靣之度分皆如此今游表之指缐平分十分舆對角線之分各有相當之比例每一分又四細分而每一細分當度分之十五秋因而一分分六十秋一度共有二百四十細分云過極至圈内外規靣從赤道線起筭向南北之雨極則赤道線爲初度所從起而雨極各爲九十度其兩側靣之度數則以雨極各爲初度所從起而赤道線爲九十度焉緯圈之度數亦然内外規靣以黄道中線爲处度所從起而南北兩黄極則爲九十度焉其兩側靣之度數則舆過至圈兩側靣所起之度數同也
