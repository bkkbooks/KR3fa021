body:
  text: 焉故兩輪互相為用一人左右轉柄軸則天體隨之進退其北極任上下於地平圈而依各省之本度也夫地平圈切用之處在于平分天體之兩半而天體左右不拘何以旋轉而其周靣上所劃在黃赤等大圈者半必在地平只上半必在地平之下而分秒無差故其承儀之座架南北二方有二螺旋轉以便用任天體上下於地平若干之度分無不可以對照焉外此著有黃赤二道南北兩總星圖并簡平規總星圖解蓋互相祭也
  hash: sha256:e4aceb7acb2cd30737c7b8d8e8de8f9063487345319a1aad7c6ab7426b986dd6
