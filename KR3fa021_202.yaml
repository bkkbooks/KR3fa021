body:
  text: 諸儀座架之法座架者所以托載重體而免致于傾仆者也座架之式有二一直一斜皆以垂線分別垂線于座架爲直角者卽直座也爲斜角者卽斜座也凡座架以重徑線爲平穩之則夫重徑者徑過重心之垂線也其週圍銖兩輕重相均兹姑二題以見例第一題凡物之重徑在其直座架內則其物必托載乎穩而無傾仆也假如重物甲乙見二十七圖托於直座架丙丁而重徑爲戊巳故重物甲乙自不傾仆矣葢甲戊戊乙輕重均平因而甲壬小半比壬乙大半必輕矣凡重徑在直座之外則重物未有不傾仆者第二題於重體或左右加减或那移銖兩則其重心必那而攺移重心一移則重徑必隱之而猶
  hash: sha256:14f8ff65169551f159eeccbabec3d581b485341004218a1b33ff0e8fd63455e5
