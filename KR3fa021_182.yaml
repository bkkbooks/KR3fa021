body:
  text: 徑於丙丁柱寬面之橫徑加倍之尺寸若干則戊之斤兩于巳之斤兩加倍若干解日甲乙柱厚面之橫徑與丙丁柱寬面之橫徑如五與一因而若巳之重一百斤則戊之中五百斤矣有兩柱見二十一圖甲乙丙丁戊巳庚壬其長短等其粗細不等其粗柱之堅固與細柱之堅固有巳壬之橫徑與乙丁之橫徑三加之比例如乙丁有巳壬三分之一而細柱之堅固能當三千斤則粗柱之堅固能當八萬一千斤因此而推圓柱之長應加若干之尺寸以知其不能當本體之重以知其橫繋于空中時若釘此一端於壁則彼一端自弱而重垂下必橫斷矣如甲乙柱見二十二圖橫懸於空中其長徑五尺於地平線平行其本體之重有六百斤若再加一千斤之重繋在于丁則圓柱墜斷今球應加若干尺寸以知其自垂而斷之處依本法之理以論之若干本柱加一丈五尺共得二丈則本柱不能當本
