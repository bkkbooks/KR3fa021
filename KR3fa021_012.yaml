body:
  text: 測看之旨越明年巳酉春正月初三日是日立春諸公卿銜命僉同視測隨蒙議政王大臣會題疏內有奉旨差出大臣赴觀象臺測驗立春雨水太隂火星木星南懷仁測驗與伊所指儀器逐欸皆符吳明烜測驗逐欸皆錯南懷仁測驗既巳相符應將康熙九年一應厯日交與南懷仁推算等語隨奉有南懷仁授欽天監何官著禮部議奏
