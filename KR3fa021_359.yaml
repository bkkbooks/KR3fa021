body:
  text: 其向地中心之垂線乙丙丁為主而以其在地靣上乙丙垂線為本山之高其測法在測量山嶽之諭內詳之今姑以測地近遠法內所列測高遠表可推而定焉夫定水平法原係細微之法若儀之安法或窺法有分秒之差而以測高低則大謬矣假如一處相距百步而安取平儀或窺法之誤不過一分之數厘而其水平線遂差至四五尺有餘也若測兩處高底之差其兩處相距倘不甚遠則于其適中處安儀而依法以測之即可以取定其平矣若相距甚遠須于相距處均畫數方而于每方之居中安儀測定左右各至之高低然後將所測定各方左右兩處之高低總歸于一而相比之則可以定其相距之高低矣測大海江河泉井等水之深淺輕重鹹淡若干各有本法本器另有本論詳之
  hash: sha256:eab58b80c58167a079b883b9331727a8ba051009fbcb6fcfaa3194c499ef4275
