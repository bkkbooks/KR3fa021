body:
  text: 取其根蓋根數多寡若干則乙球之往來多寡若干第四題以埀線球之往來求相應之時刻分秒法日以其準定分秒之日晷法如赤道大儀或以兩星相距定分秒之度數照前第一題交切南北線求某埀線球往來之總數相應天上分秒之總數幾何然後以三率法推定本球每一往一來相應之分秒幾何依此法會製埀線球推定其一往一來相應天上一秒六十次往來正對一分所以一刻內有九百往來四刻內共三千六百往來之數第五題以某埀線球相應之分秒求他不拘大小埀球相應之分秒纎微等法日照第三題用比例法其一往一來相應三十微其往來之雙行相應一秒因而上第四題所定之埀球六十次往來之時此埀球往來一百二十次又更加細微亦會另製小埀線球推定其一往一來相應天上十微所以六次往來
  hash: sha256:57b11b7b693fecca0fccdeef9270aa295941d9e1a1d73f5ed394f1d2691dfefc
