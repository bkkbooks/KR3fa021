body:
  text: 每一分又平分或四見十五圖或六或十等細分故每一度或有二百四十或三百六十或六百等細分而每細分當筭度分之幾秒焉此言細分度之法也如論分時刻之法前代之儀分晝夜一百刻每時八刻零有三分刻之一其爲不合乎天巳詳辨於不得巳辨新曆曉惑諸書中雖其所分一刻極細者止三十六分巳耳今之新儀分晝夜以九十六刻每时八刻並無奇零又每一刻十五分見十一圖每一分以對角線之比例爲十二分而細分之則每一分當十秒而一刻共九百秒是比之舊儀細之又細矣
