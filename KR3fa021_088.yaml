body:
  text: 其要有二其一儀形必依權衡之理分之即軸之周圍輕重相等而取其運動之便蓋儀形之中心與其重心不同故也其一須立軸之中線與儀之立邊平行以免致離于天頂之垂線也又于儀之縱橫兩邊相遇之處即過天頂圈之中心定有圓柱為表加窺衡而衡之下端依法另加長方孔之表與上表相等相對其指線于弧之正靣指定所測之度分任意上下進退之而于弧之背靣用螺柱以定之若用象限全圈之徑以為衡而衡之兩端立圓柱以為表則可得負圈之角而倍加度數之細分也蓋此二度相併歸于一度而此一度共有一千二百分焉立運儀左右有兩立柱其兩柱之上有雲弧下橫一梁相連如樓閣然又立軸之兩邊有雙龍扶拱以為座架立軸之兩端加以鋼樞上下各以鋼孔受其在下橫梁中有銅環以承立軸樞環之徑四倍于歸之徑環之三靣各加螺柱
