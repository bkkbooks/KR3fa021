body:
  text: 測水法水之周遠于地同為圓形巳詳於別集矣道見全地圓今略舉測水平之器與其法而言之夫水平人人之所知也然水平之理及測法之極玖則取水平者皆有所不知焉如五六丈之遠以取平難見其謬若至數十丈或數里之遠并其測法俱窮矣且測法之凖與不凖所係為甚巨蓋國家之大工如桃漘河渠為與利防患記者不越乎此夫水之通塞分於毫末之高庳其說別詳於引水法論蓋水平之與地平有異所謂地平者乃地上一線與過地中心之垂線為直角也其線兩端距地中心近遠不同而輿地平無礙見一百三圖甲丙戊丁為地水球甲乙線之兩端甲與乙去地中心戊近遠不同但其本線與垂線甲戊作直角實為地平線也所謂地平線者必其兩端去地中心近遠無二如上圖內辛壬線是也今姑舉數題以明其測法
