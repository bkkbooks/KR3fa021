body:
  text: 右監副劉蘊德筆受治理厯法極西南懷仁纂著春官正孫有本詳受秋官正徐瑚詳受天體儀恆星出入表天文家公論恆星各有其本性之驗其出入地坪時因隨他曜有善惡之相照而其所見之效遂雜糅而不純以故天象之多變易也因設此表以其居四正黃道之度比之而定其與他曜互相照之象焉所謂四正者即相交于子午卯酉四向之黃道度二十分內之界也
