body:
  text: 進呈於黼座矣乃今之所闡者亦惟明夫諸儀之用法以及於推測之所施蓋欲使學者由器而徵象由象而考數由數而悟理有所依據而盡心焉用以歷久遠而世裨夫羲和恢恢乎其有餘矣嗟乎自漢迄元攺厯者七十餘次而創法者十有三家其間創造儀象者指不多屈焉不可以見其難也哉仁不敏深懼厯學之不明乎世而敬於昭代新創之諸儀逐節伸明演
  hash: sha256:00f38705ba00017b9326f32f67ab2ce4bacdcab0f0696d7e8e1af2218a173f56
