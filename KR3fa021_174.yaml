body:
  text: 新儀堅固之理夫厯之為學也其理其法必有先後之序漸以及焉故由易可以入難而由小可以推大未有略形器而可驟語夫精微之理者也如幾何原本諸書為厯學萬理之所從出然其初要自一點一線一平面之解及其至也窮高極遠而天地莫能外焉今之學厯者於凡發明器數之書忽為平常而不屑寓目輒希頓悟於要渺之途譬之登高而不自卑何由至也即有自命博雅以格物窮理為學然而務大而遺小務貴而略賤夫道無往而不在豈事物之大與貴者理在而事物之小與賤者而理即不在乎殊不知形上之理不越乎形下之中也今仁之著測天諸儀說也不惟論其用法與夫測天之細微以及推諸天諸星之奧義其于制作法輕重法堅固法之衆理亦必詳載而論列之蓋精粗表裏互發而益明也夫欲儀制之堅固不在乎尺寸之加廣
