body:
  text: 紀限儀之用法紀限儀者原以測星相距之器也其測法先定所測之二星為何星乃順其正斜之勢以儀靣對之而扶之以滑車一人從衡端之耳表窺中心柱表及第一星務令目與表與星相參直又一人從遊耳表向中心柱表窺第二星法亦如之次視兩耳表間弧上之距度分即兩星之距度分也若兩星相距太近難容兩人並測則另加定耳表于中線或左或右之十度一人從所定表向同邊之柱表窺第一星又一人從遊表向中心表第二星其定表至遊表之指線度分若干即兩星相距度分若干也
  hash: sha256:b5be2ab88c4e97d85c0ee4a75f6a129d9cf085d4efe9cffb54ccfbd35d2aba02
