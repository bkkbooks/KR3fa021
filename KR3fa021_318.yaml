body:
  text: 中惟鳥獸之筋皮顯而易見故借其筋弦以為測器見一百九圖法曰用新造塵筋弦長約二尺厚一分以相稱之斤兩墜之以通氣之明架空中橫收之上截架內緊夾之下截以長表穿之表之下安地平盤令表中心即筋弦垂線正對地平中心本表以龍魚之形為飾驗法曰天氣燥則龍表左轉氣濕則龍表右轉氣之燥濕加減若干則表左右轉亦加減若干其加減之度數則於地平盤上之左右邊明畫之而其器備矣其地平盤上面界分左右各畫十度而濶狹不等為燥濕之數左為燥氣之界右為濕氣之界其度各有濶狹者蓋天氣收斂其筋弦有鬆緊之分故其度有大小以應之譬如人用力緊紉一物初用八分之力其物可旋繞一周再用八分之力物繞不及一周復再用八分之力而物繞則僅半周矣其用力同而旋繞不同夫天氣加減燥濕之氣收斂筋弦之理亦有然者凡欲
