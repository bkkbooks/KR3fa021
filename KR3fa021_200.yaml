body:
  text: 居空際也如二十五圖丙為地中心甲乙丙分各為之半球甲東降就其心乙西亦降就其心兩半球又各有本體之中心如丁如戊甲東降必欲令本體之重心丁至丙中心然後止乙西降必欲其本體之重心戊至丙中必然後止故兩半球相遇于丙中心甲不令乙得東乙不令甲得西一衝一逆勢力均平遂兩不進亦兩不能退而懸居空際安然永奠矣譬有一門于此二人出入在外者衝欲開之在內者逆欲閉之一衝一逆為力均平門必不動甲乙半球其理同也至四方八面一塵一土莫不皆然隤然下凝職此之由也
  hash: sha256:9055b3247b301cd5aee28d2884e58bb0d974a8eef0665773e1797bfb2f9b0f66
