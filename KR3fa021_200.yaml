body:
  text: 居空際也如二十五圖丙爲地中心甲乙丙分各爲之半球甲東降就其心乙西亦降就其心兩半球又各有本體之中心如丁如戊甲東降必欲令本體之重心丁至丙中心然後止乙西降必欲其本體之重心戊至丙中必然後止故两半球相遇于丙中心甲不令乙得東乙不令甲得西一衝一逆勢力均平遂兩不進亦兩不能退而懸居空際安然永奠矣譬有一門于此二人出入在外者衝欲開之在內者逆欲閉之一衝一逆爲力均平門必不動甲乙半球其理同也至四方八面一塵一土莫不皆然隤然下凝職此之由也
  hash: sha256:b1b3b60b6046a3b9683f730ec2a954b84c7a2dce152ac0b81666619a418c1352
