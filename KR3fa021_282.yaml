body:
  text: 大小圈度相應表推小圈之里數罕譬以明之海中有舟于此在五十三緯圈下正東行一千二百五十里卽相應赤道大圈之五度求其五十三小圈相應之度分幾何法曰五十三小圈一度相應赤道大圈三十六分六秒則一度卽六十分與五度卽三百分相乘與三十六分六秒歸之卽得八度一十一分爲五十三小圈相應之度分也又以小圈下所行之度分求赤道大圈相應之度分與里數假如五十三小圈下正東行八度一十一分求其赤道大圈相應之度分與里數法曰本小圈一度相應赤道大圈三十六分六秒則三十六分六秒與八度一十一分相乘與六十分歸之卽得相應赤道之五度卽一千二百五十里也凢南北小圈俱傲此
  hash: sha256:ee5275695750f80cd22b79d205121da68186fbfb6874a2a1f6bf7182a69c0fab
