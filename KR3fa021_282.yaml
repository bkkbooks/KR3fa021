body:
  text: 大小圈度相應表推小圈之里數罕譬以明之海中有舟于此在五十三緯圈下正東行一千二百五十里即相應赤道大圈之五度求其五十三小圈相應之度分幾何法曰五十三小圈一度相應赤道大圈三十六分六秒則一度即六十分與五度即三百分相乘與三十六分六秒歸之即得八度一十一分為五十三小圈相應之度分也又以小圈下所行之度分求赤道大圈相應之度分與里數假如五十三小圈下正東行八度一十一分求其赤道大圈相應之度分與里數法曰本小圈一度相應赤道大圈三十六分六秒則三十六分六秒與八度一十一分相乘與六十分歸之即得相應赤道之五度即一千二百五十里也凡南北小圈俱傲此
  hash: sha256:ab17a7375530b7187b399952a41a6b5a6b5976ccf2fdbc49c14bddca91ca146e
