body:
  text: 黃道經緯儀表黃道經緯儀表者以黃道經緯儀所測恒星之度分也今其表內之度分與康熙壬子歲諸星在天所列之度分脗合無庸逓加分秒焉葢恒星依黃道經度漸次東移其本行細㣲歷七十餘年而行天一度其緯度古今相同而經度則大不同也今恒星表內所列諸星之次第皆以黃道經度爲主經度少者在前多者在後悉依黃道宮度自西徂東而順列之庻便循序而推究焉假如求其節氣日何星隨太陽在苯地平之東西南北則查表內某節氣日太陽躔某宮度卽本度同行得其所求之星名也因之而安定星球星圖等器卽見普天之星於地平在何方位及離地平之上下遠近瞭如指掌焉
  hash: sha256:45ee439a9c24a5d0c9c7232f2f57f5e5f823c75b227c38001694015d3da378b4
