body:
  text: 一求日月諸曜出沒之廣一以出沒之廣求本黃道度及北極高度一求太陽地平經度一求太陽出地平高度一用渾儀成高弧表一求恆星地平經緯度一求前後合伏之時一求晝夜長短一以晝長時復求北極出地高一求晝時刻一求朦朧時刻一求距太陽出入前後時刻一求七曜時分一求夜時刻一求太陽等曜距午正之弧一求日月食之原一求交食方位
