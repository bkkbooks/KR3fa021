body:
  text: 測分秒之赤道大儀或細微沙漏水漏或本人脉息之數而對比之夫埀球往來之數必觀其大弧之往來與小弧之往來諭時刻之分秒皆相等也又大弧之往來疾小弧之往來遲遲疾不同而其所歷時刻之秒大弧小弧皆相同也又試依正南北安定三角形線而晴夜測候不拘為何星而交切之一交切則放垂球而數其往來至他星正交之時則記其數若干兩星相距愈遠其測法愈凖次夜又測候前兩星交三角形線之時又放球如前而記其往來之數此兩夜中就其往來之弧大小各有不同究之次夜所記之數必與前一夜所記之數相同也如法三夜連測之其從角宿交切本三角形線至大角星交切之則兩間球之往來皆至三千二百十二之數蓋莫凖於此也第二題有兩埀線球除埀線長短不等其餘相等其短者之尺寸與長者之尺寸如長者往
