body:
  text: 色俱不見矣天文家常測得虹霓之半徑為四十五度日暈半徑為二十二度半如甲為日乙為人目丙丁為日暈中心為庚過中心之光道甲庚乙為日暈之軸也太陽所透周圍之光道各離日暈之中軸二十二度半而此度數以內以外之光道乙日皆不得見其所映之彩色矣月暈日珥及日月旁氣之象其彩其形皆倣此凡此類通光並生雜色之雲氣比之取火之玻璃鏡如太陽之透玻璃鏡近遠無不射其光但其聚光聚火之處在圓光之中離玻璃後靣有一定之近遠人目所見雲內彩色之處亦在過不及之中耳凡從原光所生之彩色皆為次光之類比之原光猶燈光之比日光焉然燈光白日淡而不顯夜則大顯五彩之光亦然暗地則大顯者是各發其所以映之異色也夫太陽在地平之上終日照耀四方無不斜透空際之雲氣而映成多色矣凡異色于白日不顯至晨
