body:
  text: 之法原從三角形內平行線之比例而生蓋三角形每對角之線在為若干分從各分作線與腰線平行必分底而底之分與弦之比例適相等見十四圖甲乙丙為勾股形甲乙為弦弦之對角甲丙乙甲丙為股今將弦即甲乙線四分之又從各分至勾上引線與股平行此線必亦四分勾線甲丙而甲乙弦線若干分之比例必與甲丙勾線若干分之比例相等矣甲丙及丁乙即方形之長線為此一度與彼一度之界線甲丁即丙乙即方形之短線為一度之所容并方形上下之底此形又平分見十四圖或六或十二小方形以長線為界以短線為底而每方形內作對角之線為弦每弦十分之則六弦共六十分蓋窺表之指線恆交每弦之線見十五圖又與方形之界線恆平行以相等之比例比分每一度之底線即每一度方形之底以六十平分矣夫對角之弦平分若干分則窺表之指線平分若干然指線十分之
