body:
  text: 時刻之分及赤道並地平度分相應表天體儀之地平圈局列有京師地平日略之時刻分可以對本儀與天元地平四正之方向其法查本日太陽所罍之度分而以其經過南北之弧正對太陽次于南北弧線之上立直表靣東西轉動本儀務令表之左右無景其本弧線所交地平日略之刻分即所求本日之時刻分也蓋此地平日略係細分之規也其每刻之分數相對于赤道並地平度分乃依曲線三角形之理而推定之列表如左以為各地平大小日略之凖則焉
