body:
  text: 日較今日天氣熱冷若干而在管之水因而升降亦若干蓋畫夜如此而周年每節氣日亦如此是以冬氣與春氣又春氣與夏秋等氣彼此相比因管之水升降度分若干可以推其冷熱若干又今年之節氣於次年之節氣彼此相比亦然欲辨東西南北等風之氣何如則以此管對之風熱則水必升風冷則水必降捷如影響毫不爽焉又以測地氣者言之凡山谷房屋上下左右之地氣其清濁輕重乾濕諸理即一冷熱之分而大略可推焉蓋凡此諸氣之理或從冷熱而生或因他有而起則冷熱隨之元行之輕而且微以其所染外氣易入人物而薰染之由是推知人物之智愚强弱病否諸理皆感受於其各地之氣而有所異焉今欲辨其各地之氣何如則置此器於地內少頃視水之升降可以別其地氣之冷熱矣又以測人物之氣者言之譬有兩人于此其齒同欲分別其氣質何如
