body:
  text: 新儀運用莫便於滑車用滑車之法而運動儀器其便有二省人力一也儀器不致于損傷二也其省人力者何蓋凡人之起重必力與其重相等如一百斤之重必須一百斤之力始足以當之今法止用一輪之滑車而力之半能起重之全則五十斤之力能當一百斤之重若用二輪之滑車則是以力之四分之一而能當全重即二十五斤之力能起百斤之重也三四等輪之比例皆倣此假如用一對滑車又須用兩絞架而一近一遠置之其近者于所動之重物而遠者離于重物也今論一對滑車以定其加刀之比例則以近架為主蓋近架內小輪若干則力必加倍若干也但比例有二其一平分者以平分之數解之如四六八等其一不平分者以不平分之數解之如三五七等依二法安定滑車則各有不同矣如依平分之比例安定倍力之滑車見七十一圖其所倍力
