body:
  text: 一測赤道及地平緯圈於某星互相交角係若干度分一測黃道在天中度係何宮度一測黃道并地平緯圈於太陽中心互相交角係若干度分一測日月諸星出入之廣度一測地平及赤道緯圈於某星出入時互相交角係若干度分一測黃道九十度限在地平高度一測月相距日近遠幾何一測日暈月暈之半徑一測暈高度去離地冬夏春秋近遠不同之處紀限儀之用一測不拘何兩星互相距度分若干一測不拘何兩星正升度差一測某兩星黃道經度差一測不拘何星赤道經緯度
