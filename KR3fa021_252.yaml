body:
  text: 即星高度之餘弧因而推知巳癸戊角兩角之大減于小而餘數平分隨筆記之次於原南北之線為心而用窺儀東西作大圈之弧兩弧以對角線之法細分度數分秒然後將上所筆記分秒而加於南北線之東西以為原移攺之界蓋若某星向所測午前之高弧大則從本圈之中心引線至東方界若干後之高弧大則引線至西方界以此較定分界之線而比正南北之線則必合而無疑矣
  hash: sha256:377bc1309328e9f8b18e1ba7e07f5daeb0db6fd6cf40088e27ff6a7bb16732d4
