body:
  text: 圖之形而人之身必不能立矣又如人從地掀翻不拘何物其兩足必分開一前一後自令重徑線丙丁徑過本體之中如飛禽之上躍斜坡張翼而前下躍斜坡歛翼而後而重徑線丙丁前後均平分本體之輕重乃不致于身仆爾見三十二圖飛禽之頸長者足必長也當禽于空中飛翔之時引頸而前若干必伸足于後若干而重徑丙丁正在本體之中見三十三圖又如山坡所栽之樹未當隨斜坡之形而斜長葢必依中徑垂線丙丁豎立而長見三十四圖令其根其幹其枝全依之而立以免夫傾仆焉故山坡之斜線甲乙比山底之平線丙乙雖長其所容之樹木麥穗等必相等矣夫物之生成者依重徑線之理如此故能保其本體以免於偏仆也則凡造成之物必法之而以重心重徑爲座架也固宜
  hash: sha256:a9e170f8dcbf0a7d21900de11f08d6685668f8b6f63c06c2319db372d5b63c54
