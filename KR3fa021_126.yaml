body:
  text: 赤道儀之用法用赤道儀可以測時刻亦可以測經線度分若測時刻則赤道經圈上用時刻游表卽通光耳而對之于南北軸表葢經圈內游表所指卽本時刻分秒也若經度用兩通光耳卽兩徑表在赤道經圈上一定一游一人從定耳窺南北軸表與第一星相叅測之第一星者卽先所得之某星經緯度也葢測星赤黃二道之度必以顯推隱顯者爲先得之某星隱者爲今所求先得之初星必用日月太白邊求之法見恒星曆指一人以游耳轉移遷就而窺本軸表與第二星相叅直如兩耳間于經圈外之度分卽兩星之經度差也用加减法卽得某星之經度矣緯度亦以通光耳于緯圈上轉移而遷就焉若測向北之緯度卽設耳于赤道之南測向南之緯度卽設耳于赤道之北務欲其凖與夫在本軸中心小表令目與表與所測之星相叅直次視本耳下緯圈之度分在赤道之或南或北若干度分卽本星之距赤道南北之度分也若
  hash: sha256:fdf68d2b141f10284240eca3c8240d0f3ac486be5c775554f8879185d8271c2d
