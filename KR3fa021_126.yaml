body:
  text: 赤道儀之用法用赤道儀可以測時刻亦可以測經線度分若測時刻則赤道經圈上用時刻游表即通光耳而對之于南北軸表蓋經圈內游表所指即本時刻分秒也若經度用兩通光耳即兩徑表在赤道經圈上一定一游一人從定耳窺南北軸表與第一星相參測之第一星者即先所得之某星經緯度也蓋測星赤黃二道之度必以顯推隱顯者為先得之某星隱者為今所求先得之初星必用日月太白邊求之法見恆星曆指一人以游耳轉移遷就而窺本軸表與第二星相參直如兩耳間于經圈外之度分即兩星之經度差也用加减法即得某星之經度矣緯度亦以通光耳于緯圈上轉移而遷就焉若測向北之緯度即設耳于赤道之南測向南之緯度即設耳于赤道之北務欲其凖與夫在本軸中心小表令目與表與所測之星相參直次視本耳下緯圈之度分在赤道之或南或北若干度分即本星之距赤道南北之度分也若
  hash: sha256:1b774c055123d3762fbf097521dd6794078c92b9ee9186fc70c0bdde384e6755
