body:
  text: 處起行依針盤第三方之向往丙處見一百零二圖而甲處緯度即本極高度為二十八度丙處之緯度三十六度求兩處相距度分法日以大緯減小緯即得八度次查地經緯及方向表內第三向正對緯之八度即縱橫兩列相遇之方內得九度三十七分變之為里見度變里數表則兩處相距為二千四百零死力又三十六丈也若緯度外另有緯分即照前法入表而得其相應之度分假如丙丁兩處緯度之差為十度四十五分而海上有舟依第五向從丙至丁則第五向對緯之十度縱橫相遇方內得距之十八度又本方對緯之四十分而相應得七十二分皆度數之分也又對緯之五分而於相應方內得九分總計之即得十九度二十一分之相距變為里數共得四千八百三十七里一百零八丈第二題有兩處相距及方向求其緯差假如有舟于此
  hash: sha256:22e7dbf3f9fa47b03a3f2e5e53f5eb44d00eba88aa040e50f079960cb19f108b
