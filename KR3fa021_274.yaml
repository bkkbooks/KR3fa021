body:
  text: 處起行依鍼盤第三方之向徃丙處見一百零二圖而甲處緯度卽本極高度爲二十八度丙處之緯度三十六度求兩處相距度分法日以大緯减小緯卽得八度次查地經緯及方向表內第三向正對緯之八度卽縱橫兩列相遇之方內得九度三十七分變之爲里見度變里數表則兩處相距爲二千四百零死力又三十六丈也若緯度外另有緯分卽照前法入表而得其相應之度分假如丙丁兩處緯度之差爲十度四十五分而海上有舟依第五向從丙至丁則第五向對緯之十度縱橫相遇方內得距之十八度又本方對緯之四十分而相應得七十二分皆度數之分也又對緯之五分而於相應方內得九分總計之卽得十九度二十一分之相距變爲里數共得四千八百三十七里一百零八丈第二題有兩處相距及方向求其緯差假如有舟于此
  hash: sha256:8f6304923bc88efcea3b39a5fb50ca4a4cb86b09a138560d1068caf59de3be4d
