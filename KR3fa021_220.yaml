body:
  text: 人手拉繩至五尺一下則盈水之筒即起有四十尺之高而手動五尺之時水筒巳去四丈之遠可知其速巳其儀器不致于傷損者何夫儀器愈廣大則用以測天愈精微但其廣大若干而其重之斤兩亦若干若無法以運動之則未有不崩墜而觸損者矣故紀限儀之大弧象限儀之長大表等運動之皆用滑車之法見七十五圖蓋滑車輪多近遠置以兩架用一繩以多繞而相連之雖其重大而有垂壓之勢然因其繩繞之紏纒而勢不能驟開必有先後漸次焉故儀器用滑車以絞動設縱偶有脫手其繩必不能驟開而致有崩墜觸損之患矣蓋滑車之理小輪兩架繩繩若干則其用力加倍亦若干又拉重者比其所拉之重行動之捷若干則其力亦必加倍若干故滑車之繩一端若繫于近架拉重則更加其力矣又用多輪之滑車一對不如用單輪之滑車
