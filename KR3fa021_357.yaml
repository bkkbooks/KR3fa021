body:
  text: 第一題測定兩地同在水平線上下若干法日取其平器安于兩地互相距度數之中見一百四圖假如測戊巳兩處同在戊巳水平線中否則取平儀安于丁而從本儀左右之兩端表窺測兩處從右表窺向左處從左表窺向右處若測戊丁兩處而儀器止安于一端如丁則以丁戊線為水平線而大誤矣若照此線引水從丁至戊則其水必從戊向丁倒流矣蓋測定高法以垂線為主而垂線以地平中心為定向不拘何物之垂線在地靣上若干則其本物之為高底亦若干今戊癸線為戊高之垂線丁戊雨處所差之高度則戊癸線也戊丁兩處互相距愈遠其差愈多古有側山之高而每有所誤者多在于此見一百五圖乙丙為高山在地靣上古用象限儀從遠處戊測其高以目所窺壬處為山頂而以其在地平戊巳線上之垂線壬巳為由之高但山之高則以
