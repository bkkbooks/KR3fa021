body:
  text: 第一题測定兩地同在水平線上下若干法日取其平器安于兩地互相距度數之中見一百四圖假如測戊巳兩處同在戊巳水平線中否則取平儀安于丁而從本儀左右之兩端表窺測兩處從右表窺向左處從左表窺向右處若測戊丁兩處而儀器止安于一端如丁則以丁戊線爲水平線而大悞矣若照此線引水從丁至戊則其水必從戊向丁倒流矣葢測定高法以垂線爲主而垂線以地平中心爲定向不拘何物之垂線在地靣上若干則其本物之爲高底亦若干今戊癸線爲戊高之垂線丁戊雨處所差之高度則戊癸線也戊丁两處互相距愈遠其差愈多古有側山之高而每有所悞者多在于此見一百五圖乙丙爲高山在地靣上古用象限儀從遠處戊測其高以目所窺壬處爲山頂而以其在地平戊巳線上之垂線壬巳爲由之高但山之高則以
  hash: sha256:c18a9d6a5e31f06550b62d79c02826ff7c3cf578d6c7b119205e74535e8b3e7a
