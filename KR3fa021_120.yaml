body:
  text: 地平儀之用法測日或測星须于地平圈內旋轉中心表向于本點凡謂點者則日月之中心衆星之所在也而令橫表上所立勾股形之兩線正對之蓋勾股兩線如股與弦或勾與弦并人目本星四者相參值則橫表之度指所在即本星地平之經度分也或從東西或從南北起而數之皆可若當日光照灼難用目視則于白紙上以勾股形兩線相參直之影為凖若日色淡時則可用目視之然人之目與太陽正對亦必射目须用五彩玻璃鏡以窺之其餘儀器測太陽皆用之若夜間測星不拘何器必以兩籠炬之光照近遠兩線兩表所謂近遠者即于測星之目為近遠也其炬光须對照表而不可以對照測星之目試將籠炬糊其半而不使之透明于其後則人在籠炬之後于隱暗之地而目所見凡光照之物更為明顯也
