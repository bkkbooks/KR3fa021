body:
  text: 地平經儀地平經圈之全徑長六尺而周弧之平靣則寬二寸五分厚一寸二分東西南北劃象限而四分之每一象限則為九十度每一度依前法六十分度數之字以南北界線各左右起算為初度之界以東西界線為九十度之界從東西向南起算北反是夫地平圈之四靣各有一龍以頂承之見第三圈而四龍安于十字交梁之四角而每角加螺旋轉一具可以凖儀而取平又十字交梁中有立柱與地平圈高等其中心為地平圈之中心從圈之東西二方地平之圈上又各另加一立柱高約四尺柱之周圍各有一龍蜿蜒于其上乃從柱之上端中各出其前一爪而互捧火珠蓋珠之心為天頂而正對地平圈之中心則從地平之中心至天頂有立軸而立軸之中開有長方孔其中從上至下有一直線為立軸之長經線并為天頂之垂線過地平之中心加
  hash: sha256:f2b77965d5dba098336563f4671da7d6fdd2c372fcc3ab339c86c092c08eb92a
